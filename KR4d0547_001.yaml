body:
  text: 鹿皮子集卷一元陳樵撰賦東陽縣學暉映樓賦於穆玄聖參天二地啓迪人文軌物垂世粵自漢魏以降神明繼位秉符握鏡向明求治莫不疇咨古訓含仁茹義用能光集聖猷四王六帝於是立辟雍于上京疏泮水于侯邦東膠西序右學下庠敬以禮合德以樂章上規勛華下凖夏商承先王之容典揚聖哲之耿光於是萬方景附聲教風翔或石室講肄或廣崇黌宇慶厯已來制詳化普應詔作宫周於率土藹學士之雲從偉搢紳之鱗聚曳方履兮秩秩冠切雲兮踽踽夏弦秋吹春干冬羽惟吳寧之下邑實金華之東鄙伊文儒之至盛泛弦歌之盈耳煌煌學廬嵗時肆祀矯華榜之髙張煥彤扉之洞啓黃闥凝旒軨軒列棨庖廩具修講堂雄峙飛閣中起紅采相宣則有羣書漆版汗簡華緘積縹囊與緗帙藴瓊軸與瑶編鼓六籍之芳風回百氏之驚瀾下臨萬井夾巷回阡鬱層樓之夭矯兮獨孤峙于西偏顧東隅之薈蔚兮翳豐草之芊芊偉邦人之經始兮結斯樓之耽耽椽欒對竦飛棟交聯若黃鵠舉翮兮矯將飛而未安嘆興廢之屢遷兮乃旁屬于齋宫登兹樓以相羊兮愛結搆之豐隆赫華榱之參差兮儷曼宇之彤融浮柱離離其相距飛甍嶫嶫以騰空散緑霧于綃􅖠擷彤雲于綺櫳俯市列之闤闠兮見陵壑之蔥蘢復盱衡而四顧兮想前列之清風眷清碧之蘭林兮攬三丘之雲松飛岑連嶂翠碧成叢慨仲文之才藻兮顧沈身于慙德猶棲棲于末路兮臨青冥而鎩翼仰興宗之遺烈兮嘉幼公之殊績相昭諫之隱居兮思玄英之逸迹發詞圃之春華播風流于金石哀相國之東歸兮忽山林之改色慕張生之絶塵兮採瑶蕊于山側俯察仰觀感今懷昔故凡胸耕掌録之徒負素挾書之侣或奔走在廟進旅退旅芹茅在籩體薦在俎捧匜奠斚灌樽薦甒或張侯棲鵠觀德是務矇叟登歌射夫獻舞揖遜周旋升降有度或禮行鄉飲事賔有主詩歌合樂獻酬明序黻冕既脫笙匏既去志煩思亂於焉遊處或登髙之能賦托歌詩以陳志攬翰墨之餘波兮發髙藻之遒麗樂文章之穎秀兮來衆士之番番吸吳越之清風激燕趙文學趙人之悲歌洗心飾視光英朗練乃顧坐客起而為亂亂曰華譙中天靚以清兮琢鏤為户文錦楹兮丹翬引翼翠螭騰兮下顧萬瓦玄玉瑛兮抽琴命操朱絲鳴兮劒光落袂香蘭纓兮婆娑藝圃夫何營兮張義為幕理為繒兮間犧賦池上小閣融火向中余方慎夏接葉罷亭依山忘榭麗草長林未卜與夜臨池館水不怡隂厦伊清池之蹇淺兮覺水氣之已多蔭諼草而翳蘭兮結斯搆之峩峩疏堂屬其南垂清隂生其四阿杜余門而卻掃兮日長往乎滄波招招緒風持雲沐露窮夜為日迄于闌暑余凌波而雅步兮魚鱗鱗其在下若停橈之萬斛當步軔之秋浦朱塵倒景若櫩而飛疏箔懸繒五兩萎㽔燕循檣而失據鳬就槳而無依不纜而維不枻而安承艫絶後接軸無前四載不服萬夫莫先亡余楫之蘭桂廢余橈之芳荃又若委陋舟而弗御猶誕置之河陾也蔭斯亭以寓處兮瞻浮榮之翔翥文謝杏梁珍慙桂户藻離棟而成妍題去榱而加昈銀榜昭其碧鏤皓璧燁以振素波塵屬跋雲松薦礎澤葵生閣蘋花照籞浮萍附躓雕胡承梠愛夫容之婉婉兮藉初日之明輝色瀲灩于顔間蔚藻繪之備施傾蓋成隂聯袂成帷含芳揚烈茹華吐奇當筵薦綺在檻成梯映朱鷺之芳翰增翠羽之緑姿鶯鶯在栁媚蝶時來爾乃御緅絺攬蕉荃肆莞蒻燎芳蘭緝靈草以為蹻緯楚竹以為冠白紈微舉芳風可握或進壺挾矢投瓊擊博或從橫竹素佃漁交學或左設鴟夷右操釣具蓑笠長拋笭箵不御屑桂垂芳聚粒為茹投八絲之翠綸沉百囊之緵罟於是丹鯉含腴蓮菂豐甘葵葉初肥緑杞闌干山膚陸芼華果具繁張飲命客觴政在前蕉葉無奇金舠猶窄折葉薦芳引筒分碧挹蘭英之春醥釃玉葅之芳液洗慮延歡祇以永日雅歌清吹與舟共浮合樽促席敷衽綢繆今夕何夕與子同舟抱月坐花藉以蘋藥視夜參半衡漢回薄情盤景遽賔客益落乃起而為扣舷之歌歌曰世冥冥兮塵汙人慕前烈兮凌青雲食有魚兮蔌有蓴願投老兮守丘林座客聞之又稱歌曰卉服兮舟居荷為屋兮荷為袪宿沙子之徒與江上丈人之徒與卧褥香爐賦廣宵宴于上春兮蛾眉紛其狎坐錦隨舞散引連吹罷歌殘緑玉之杯笙暖茱萸之火月轉華房缸花暗墮芳襟微解男錢半妥衾聯罨畫褥飲紫霓絳螭蚴蟉英蘂紛披連溫幈之屈膝卷華幔之參差空翠忽其滿堂兮集衆芳之菲菲若蘅薇薦芬沈榆效質又若龍腦在燔丹螺獻甲漢壁捐椒楚芳委榝奪藉蘭之蒸惠醒醉花之病葉博山倚席菡蓞生寒薔薇百濯豆蔻湯乾香從何來來無定源藻繡叢中不火而然香生弱縷五色非煙援衾拂席銀黃可鑑動如丸走止與輪停觸鈿函而不轉環綬笥以如縈拂綺襦而緩引當白澤以留行左右周旋芳塵不驚金燼無迹芝印長存花將銀縷靨隨金校么鳯低回蟉龍天蟜鈿花爭麗雀翹分藻映紅玉之春嬌共瓊株之晨照晝隔郤寒之簾夜近緑衣之鳥寒依熊席溫隨犀簟初辭露竹之几旋遲五明之扇共君合歡之繡被藉君象牀之羅薦外惡方以玩世兮中石心之不轉均茵席而莫我知兮謂方心其如面內仁外義千載金言彌動彌靜聖哲所敦願以小人之腹為君子之心玳瑁賦庭下有龜白質而黑章豐上而折跗或曰是玳瑁之屬也作玳瑁賦繄鴻濛之散英兮滋百昌于南紀邈靈海之於廓兮涵衆珍之靡靡其廣無垠其遐無涘日月之所亘四極之所被裸壤藉其涯冰天薄其澨若夫蠻畿羌笮烏荒象卉莫不遐舉而兼攬也於是沸脣椎髻之徒狼戾戎蛋之裔挾浮環以亂流摻霜綸與桂餌結精鋌以為網控三翼之雲駚楫為馬兮舟為車陋玄洲與渠子披淵剔藪窮珍盡竒回輪頓繳傾于南嶽磔明月于珠蠙擷貞球于文魮刋珠樹之靈柯搴火齊之夕暉剸冰紈于潛魚脫竒觡于明犀乃有鴻商富賈巨千之資載糇舁糗據險乘危徴榜人命水師披瘴雲櫛炎颸涉瓊林走麻離厭西棚瞰吉慈陵厲三韓出沒流眉絶訶陵與林邑歷麻蘭與勿斯投鬼關而徑度迫海童而遵蹊則有罟師奏美蘆人效竒囊琛航貝轉于京畿不踵而蹻不翮而飛紛綸奪視翠粲填眵天琛水異霧委星離雖仲宣之博雅張華之析微知崇文鼠辨洽碧雞固莫能悉察而周知也客有遘歸艎于番禺得文龜以遺余驗神物于幽徑實瑶光之所攄上規圓覆下凖方輿龍脰宛宛山覆丘紆中跗絶甲或閣或舒鬱承弇兮蚢綷矯反倪兮金鋪緣純被藻繞脅垂緗冒彤紋而綴黝披皓璞以含黃故其赩翼凌亂隆麗清靚則異文豹飾侍殿防也繁綜紛紜彤融文璘則湘靈凝涕被叢篁也逺而視之若赤瑕雜襲照璧璫迫而察之若紫貝駁煢被龍堂儷䵶鼊而方華混餘蚳而比瑜瓊蚌鸚螺碧鮒丹魚方斯蔑如也或遺鷇于珊瑚之叢或命羣于雲精之瀦若夫鯊鮞鮥鰝鱒魾鱊鮬鯼鰼鮡鱦鯤鱬莫不投吻委骨接景流腴至若赤水安流丹涯罷潮沈駭焱于窮髮晞扶光于沃焦斂璇臺于蜃氣結戎鹽于翠條接余含榮虞蓼垂蘨雕蓬鬱遏遊龍森簫石藴肉而吐華鮭隱甲而生苗魁祿含漿委其潏螺蜬􅛔蜂填其坳爾乃登珠澤薄無皋蹸水英獵神虈喋海藻之雕葩蔭靈茒之緑苞出碧津之方羊陟瓊田而逍遙唼血飛涎卷殼含膏於是豫且搆網盧亭進蔚獠市掄材海人薦骨解甲刳腸剖筒釃血哲夫準量良工辨質或擬通犀而鏤梳希粵象以為櫛綴簮珥之磷亂糅靈叉之豔逸壓唐妃之義髻鑑夏姬之光髮虎髀斂姿宛珠罷潔精逾玉燕價傾寶葉顧三珠而未竒豈九雛之能奪委質而嫫母含榮潛輝則陽文艷滅恥借映于金苔謝浮光于海蛤或青殿受妃桂宫御服縆華擲之陸離搆寶臺之采縟尊别魚須飭隆荆玉制備翬褕禮均展鞠乍金炯之辭奩方紫珍之在御翠氣菱荂素華月騖影麗雲承葩垂蕚跗被玉水之餘滋藉金膏之微汙或摛華神屋效質望仙綰寶帳于靈臺雜明璣以押簾錯以金機絲以玉函芳苡內朗丹髓外烻火齊牀明鬱相蕩珊瑚􅖠近青連錢彼僂句與大蔡雖殊用而同體為王國之大寶兮顧何辭于三釁羌殺身而無補兮合璪貝以為靡繄巾笥于廟庭兮豈神龜之可比幸寄身于齋房兮脫微生于泥滓徴朱鱗以療飢委丹粟以為餌或潛迹于金沙或揚波于翠水渺瀛海之東被兮吞百川之輸委旦吾投于清流兮夕振蕩于海尾苟未忘于反身兮豈沉光于沼沚迎華樓賦浦陽朱仲山名其樓曰迎華以思親也其先人好神仙云昔在黃帝世有玄德敷佑下民芳猷允迪越厥帝姬踐修曠迹誕受瑶圖冥期罔慝比質鸞儀方標鳳翥青靈既爇甘泉罷御繼龍轡之遺髯振清簫于雲路婘仙華之明秀兮夫亦靈修之所寓也伊仙華之雄峙兮實作鎮于海隅幡元氣之淋漓泛浩翠之鬱紆候神之館既相望于東南兮又下通于鼎湖祠廟千秋嵗時莫瘞祥慶足徴民無札癘嘉薦明粢芬芳式備登兹樓以清眺兮抗仙掌之千尺煙分霧繞霞舒雲積二華藏英莫之能敵九華斂秀攬之失色上有人兮永懷慨先人之敝廬華梁婉其承枌兮重欒屹以綴櫨朱華被井麗藻垂疏巡瓊簷以屣步兮思帝子以愁豫想神君之遊行建雲旄以前驅登寶衢與雲術命含雷使清塗霞為車兮虹紖從軒轅兮山之下靈奉轡兮驂車朝吳雲兮暮為楚雨若方平兮曼倩挾麻姑與王母雲風颯其揚塵兮獵玄蔭而靡丹荑碧雞羣飛而晝驚兮疑神君其並來俯回軒而四顧兮有平莽之萋萋曽光塵之莫覿兮悵獨寢乎空帷夢仙家之巨萬兮瑶臺矗其崚嶒赫祥雲之燭日披赤霧之冥冥覆明霞之遊館蔭光碧之殊庭翳紫桂之神宫列積舍之層城翠水曽波碧林被宇拂珠樹于犀階植文玉于蘭渚瓊柯鬱以離立金根儼其相柱神獸敷曜于陽林朱雀流光而來下亦有五色遊龍青霄玉女女以守瑶林之桂實龍以耕芝田之宿莽飛轡凌煙羽輪輕舉或掇碧藕之靈葩或拾翠鸞之墮羽葺夫容以為冠攬霧綃以綴衣望九靈其如雲聯霜袍以成帷挾龍符之靡曼蔚鳳綬之萎㽔勒黃金之條脫兮縆以水碧之藍絲赤玉之飛舄兮藉金液之龍芝揮精之寶劒兮映碧奈之華滋忽仙靈之在旁兮雖信似而懷疑起俯懷而興慨兮知夢幻之不可期啓交疏以周覽兮瞻瓊宙之漭漭怨翔陽之短景兮忽委照于西壤屹玄珉之雲譎兮繡闥儼以雙敞山有二石門竦柏木于玄林藉芳藥于叢莽彼草木之無知兮有喬梓之俯仰紅翠嚶其載鳴兮聽璇房之遺音遊鷮兮杉雞曜斐尾與與一作兮紛文豐狐晝嘷于林薄兮騰猿援木以清吟羡楚烏之返哺兮感鳴鶴于江隂攬萬物以自悲兮苦愁思之不可任臨長風以孤嘯兮明月出于東方繁星粲其麗天兮若蘭甸之流霜情於邑而不寐兮恨神爽之不可望慕帝子之承顔兮從君王以翺翔曽來歸之未期兮淚沾襟以浪浪陳悲歌以下招兮夜漫漫兮使子心傷歌曰燭銀玉果璧環光些雲裀霓褥不死牀些瑶壇金闕光碧堂些居室之麗無以方些碧芝琅菜扶桑實些玉酒釃漿五英液些風林鳴醋中華密些綺饌之腴莫之能及些雲裝煙駕龍回車些飛輿八景麟胥胥些上下風雨翔紫虛些車服之盛不知其餘些緣雲飛觀中天樹些四榮翼張若騫翥些清防暗列浮思布些雕機朱絲有竹素些雖信美兮非其故些魂兮歸來返吾居些胡氏鐡心亭賦梅亭太白主人居東海之上玄虛先生過而問之曰丈人目視雲漢志傾金石淳潔無華溫慎約敕獨標樹于當年守貞度而不易矯矯兮強懷夕飲冰兮旦而食蘗慕人倫之師表謂黃金百而非貴托雲霞之石交空萬流于海內思欲起伯夷于九原與卞隨乎並世夫伯夷之徒固常有于天下矣子亦有覿于彼者乎子欲往而從之敢攘袂而橫議也主人戄然曰先生言之其人為何先生不答操琴而歌曰若有人兮山之垂安名節兮久而不隳願飾巾兮改視共褰裳而求之芳猷兮雅道非夫人兮誰歸主人未達從巫陽而筮之巫陽散策而言曰曵雪兮牽雲縞衣兮練裙傍木兮非溫草上兮非伸溫伯雪子之朋徒列姑射山之神君托雅故于君子何頭白兮如新稜稜兮爾懷昧昧兮爾言林中之晳兮實慰我心於是朝與客乎同車夕假道乎陽林驂既怠而當休見逺梅之臨春于時木介連枝蘭階玉折火齊寒生燭銀熖滅濯乎其華燁乎其澤跨雪懸冰訖不變色青女之靈不能威折丹之淫不能屈蓋其英風雅操則楚大夫之遺烈枯株斷影則漢黨錮之餘骨又若顔握拳而透爪樊飾怒而眥裂雖吳人之木腸鳳閣之鐵心猶不足以喻其伉厲清刻也主人好之見梅必式顧謂先生曰客亦知夫江南之嘉植乎觀其勝氣髙情豐規茂德等契青松同方紫柏足于性而無所待兮曽天損之莫入增人間之徑氣殆天縱之遺直既亘地而垂芳亦終天而建極表萬物以雄峙兮為奉身之景式羌信美而非吾徒兮托年芳而混迹待伯夷乎未期獨耿耿乎中夕也先生喟然曰聖人不作前言戲之爾向所稱引良謂足矣丈人亦聞其風而愔其恐當作媺歟願白首而同所歸也爾乃步玉趾乎山陽撫瓊樹以承顔抽瑜辭兮豫誓左佩華之翻翻思解交兮春榮畢殷勤之餘歡枉光塵兮來下願無乖于嵗寒於是結遊亭于園廬薄長松之浮隂文㮰翼張蘭棟流雲礎花承柱井藻垂枌巡簷改樹當檻移春聯芳比秀隂洞連尋方積雪之時晴映紅旭之焞焞蘭芬玉潔桂郁芝薰嫓三王之珠樹配二謝之玉人躋瓊花于賓末蹴琪樹于下陳竊獨懷此玉度兮遂永謝于芳鄰於是易衣改席賔客狎至花落金荷月隨珠履解腰下之楚芳撤爐中之緑蕙彌日信宿載挹載味若孟公在座為之震起柱史在周莫不嚴事樂君子之得師慕髙世之風規舉觴實酒為主人夀乃稱歌曰世俯仰兮取容非前哲之所期君委懷兮崇德母表合兮內違斂春華于茂實負玉鼎于丹墀願和飪于百度安明節于當時主人聞之又稱歌曰洛有花兮江有蓮閲桃李兮有令顔懼明德之未崇日車馳兮莫豫翻蘅蕪襲豫襟夜光生豫冠潔情條兮行葉終與花兮周旋月庭賦為朱仲華賦月庭主人玩世遺榮放情逺蹈衣薜荔兮藉蘭抱明月以長嘯有逺遊子悼容華之易遷總名遊之飛轡歎芳塵之暮起兮獨申旦而不寐秉蘭燭以命客慕西園之夜遊按翹袖之艷舞徴阿激之名謳陳葆階開翠樓銀花大合緑桂光流驚鬱華之絶軌疑曜靈之罷馭未旦忘昏當宵啓曙故雖清曜之麗天兮寧麾謝而弗顧也於是月庭主人過詫逺遊子曰吾聞承雲在御則靡靡無聲扶光當晝則丹良斂迹伊皓月之明迥兮托玄夜而顯質被羣隂之宗光攬餘暉于日窟細栁分榮瓊池增色麗朔則著象于懸車薄晦則垂明于中夕影已缺而玉兔蘇光質將盈而素蟾散魄抉天閫以西流磔地垠而東適方今若木收華金樞朗曜美清夜之虛明泛寒光于遐眺煒燭燭其精熒娟紛紛其縞皓朗璞藏英明璣埋照隋掌增羞郢握自弔雞林失簾箔之珍玄圃隱燭銀之燎攬海蛤以非竒豈明苔之足較又况乎蘭燼之爭華螢炬之窮妙也今吾子謝寒彩于溫幈蔽明暉于翠幬是猶忘白日之正中執隅燭于窔奧也不識子願從我而遊之乎逺遊子曰僕少好紛華願挹清風博以殊觀敢謝發矇於是歷級尋簷散步從容攬豫袂之英英兮若流水之翻空飾桂户以銀鋪兮易蘭房于雪宫連門裂帛在網成琮紫絲幛兮丹露寒翡翠帷兮碧霜重照瓴甋兮愛玉階之赩奕顧環堵兮憐瓊碧之菁蔥邀我乎璇臺期我乎鶴寢之中曄金虎之曜質兮綴瑶光之耿耿繁星播其華藻兮亘碧藍之萬頃若鹿苑之揚輝兮繞清揚而玉映俯孤域而遙睇兮飛樓觀之離離若盛姬之璧臺兮極椒風之麗美又若銷白銀以為闕兮望蓬萊于海湄影標鞶鑑光隨句履寒生貝帶色動纓㽔遊目郊原百卉萋萋被輕容于平楚鋪白綺于蘭池水壑兮青蕖銀泥兮翠花佳木偃旌隂竹揚徽家藏玉樹尸列玕琪悵徘徊以延佇兮忽棘露之霑衣愛靈籟之夜生兮若笙鶴之參差乃泠然而嘯浩然而歌歌曰明月燭燭皎以鮮弱雲無姿照碧藍玉衡銀浦共闌干良辰急景促雕年蕙纕華玉夜珊珊歌長衣袂風露繁逺遊子聞之又歌稱曰珠璧雖明光一室兮鳳膏蘭燭非至質兮虧盈消長清光不滅兮飛龍銜燭未若兹月兮清夜漫漫長歌既絶密熖收銀龍揭揮瑶琴操白雪河傾月落餘歡未歇放螢賦隋蕙草暮闌暑除皇歡洽清夜徂命合宫侍燕胥出紫房背椒除金吾輟警鳳燭成行渴兔灑塵飛蓋飄揚萍駕神移椒蘭夕香千衛百騎乘堅驅良左鵔鸃右步光幸帳殿臨鞠場離宫榮觀息宴無方易牙割烹儀狄挹漿蘭殽如陵桂酒如江鵠漏向丙宸賞未央皇帝惡丹燭之易銷惜照車之未逺顧碧圭之鮮曜恨金苔之熖短明月罷懸夜光不展怨白鳳之不來慕燭龍之逺攬乃有黃門持槖園吏荷囊挾丹鳥馳乘黃於是緑水罷歌艷舞離牀循桂道出蘭堂步神皋歷重岡比竹無聲蓄軫山陽門燎轉遙圍燭收光裂囊解槖從風直上亘地彌天光熖百丈聯輝接艷互滅齊明魏璞分華漢井疏熒玫瑰奪焰火玉辭榮白虹貫月列火為城齊連枝之鐙樹配照夜之金精韡韡酣酣前後千乘熏夕幽玄萬象具彰所覿維何人間天仗華旗孔蓋金璪琳琅犀羈龍勒繡鞅玉瓖璚鸞搖裔飛屑焜煌文茵毳幕風動帷裳立馬如龍執戟如霜女騎聯鑣金碧相望巾㡚輕明微見花房鬟列四枝叉分三子華袿㻲帶光連鞶帨紺袖分明碧唾花裙叉猶殘紫海水於是乍離乍合將留復去繞雉扇而如縈綴流蘇而欲舞映橫帶之萬釘耀盈腰之三組拂瓊辨而懸纓投羽衣而及屨思拔貂而遽脫已入懷而徑度桃驂振迅皇駁驚疑金盤陀兮照夜青騕裊兮頻嘶鴰鶡忘明雞人輟晷顧鳷鵲之失枝誤宫鴉之亂起於是離宫傳燭乘輿言旋鵠籥夜開入宫下輦餘歡未畢影娥零亂户挾露囊人操紈扇金屋遲明銀牀拾熖帝乃乘宫車臨月殿工登歌御三飯傳杯授簡以命絳仙吳姬再拜而言曰丘園弱息草萊餘燼周旋蘭掖出入椒閫待詔後車策名清禁沐浴春陽天慈光被榮添楚艷恭逢漢侈近君王之密坐思捐褶兮燔翳同明璫之在掌方契刀之處囊非孤逺之有耀被天子之清光恐煙霄之失路委蔓草之荒涼願回霜而收露幸長近于太陽乃作歌曰赫赫皇謨赤精子溈汭化成光萬世銀釭未冷戒鳴雞幾度金苔委丹地綺錢青瑣進疏囊堯禹世人同寸晷長秋宫中涎涎尾漢以炎火烏用水於是皇帝作歌綢繆宛轉謂侯夫人起而為亂亂曰天威燀耀景化行英姿四照宣皇明紫脫華秀泰階平百王仰鏡萬世榮螢鑒增輝若木英光啓玉度垂休聲帝乃歌曰舞玉梢兮歌發梁歌倚瑟兮行羽觴龍腦煙寒五成帳玉華零落珊瑚牀愛丹鳥兮往來照褕組兮繁縟光華夜繞瓊樹珠莫向璿宫妬銀燭長門懸月照阿嬌共聽天子無愁曲六宫聞之皆稱萬嵗太極賦何太始之無始兮坱圠希希一作希夷後不知其有終兮前不見其肇基龎昧無眹何象何儀九乾何端八極何倪五方何屬四維何施非圓何覆非方何祇五辰何撫六宗何司為天道之大原兮有物混淪大不知其外有兮細又入于無倫長上古以為生兮閲萬世而長存懷道體之大全兮命元氣以為慿天人於是乎成性兮裂積氣而標形方其函三義以為一兮氣磅礴而未伸清與汙其雜襲兮曽玄黃之未分邈沆漭而漫誕閴䁆靄而幽紛溟涬兮參寥沖漠兮絪緼馮馮翼翼杳杳旻旻育白日于瓊池孕明月于蕊淵列象兮儲光孰辨兮昭昏於是沉奧眺垂清陽髙抗下蓬勃而蓊㔩上扶輿而森爽女媧揭石以傍視倏忽廢鑿而自喪天經地緯成文成象積氣舒光昭晰清朗川疏瀆融海涵嶽壯四遊上下與時升降天寓左旋行無停輪玉衡斡流七政率循其出入之息互為吐吞乘氣之機呼寒吹溫六月一息開陽闔隂動為靜基靜為動源溫兮寒所伏寒兮溫所存極不期復時往時來二氣所布是行四時襲四為五五氣相滋方青嵗之開先兮又握赤精而嗣之襲黃靈以白藏兮又申之以玄煒沖氣蜿蟺隂化陽施彚列條分萬類雎雎動行植跋鱗泳羽飛人道配天有仁有義天去人其幾何雖殊分而一理無始之真吾其性五氣之精吾其體故道至察于鳶魚氣可塞于天地也吾嘗望元氣之輪囷兮思邃古之開元瞻天運之不息兮慨萬物之藝藝物更謝而迭瘁兮皆太始之來昆曽昆侖之不老兮世彌久而彌新夫天亦不能以自己兮吾又烏知其門哉系曰無始之真肇混元兮為物祖始萬象先兮思述祖德窮化原兮名則無有辭何宣兮昔有人兮襟桂蘭問天不對兮餘千年四時錯行兮品物繁天對甚侈兮非無言蔗菴賦蔗菴主人挾册兔園自稱傖父英詞玉潤髙標鳳翥恐白雲之寒絶望青冥而微步泥金日逺青陽色故出處交其懷窮達干其慮夕見周公旦延曹父夢與時移迹隨心著屬荷屋于雕欄襲宫錦于龍具畫輪未滅雞棲在御忽稅駕乎靈山值瑶臺之真侣登金堂而蔭玉室兮翳瓊林與珠樹覺而若失求之達曙於是封植成隂憲寫宫府銀榜髙懸緑宇當戶琴樽命客棋槊交午主人指華榜而謂客曰此所謂魯之楚宫而蜀舍之在劉氏也而豈蔗菴之謂哉彼蔗菴者銀臺赤室之流亞翛然于天地之間而古今莫之知者也以為無有則吾涉其地矣曰吾舊遊則子於吾乎求之蓋其在方外也北倚瓊樓南屬長離西接白華中臨翠水東望碧霞下連金地秦人鞭石而望洋謝娥入海而增喟舍飇車與羽輪三萬里而渡弱水者自我始也若然者果非夢也耶吾不得而知之矣吾將約飛瓊以復來期芳卿之狎至夕吾遊乎殊庭旦歸休乎宇內優哉遊哉期以卒嵗而人則曰庶幾佳境之可致也吾何以榮利為哉吁嗟乎君仙之居兮瓊璧連楹浮隂張日與子之室為二為一乎綺疏蘭術金堂玉室列仙之窟也子能曳裾彈鋏以終其身乎華房曲密竹書瑶瑟子之室也亦知安其身非所以宅其心乎嗚呼求諸外未若求諸己也安其身未若修諸身也奈何柘漿石蜜忘搗虀攻苦而受辛耶天下之佳境不若是也蓋出入生死八極神遊者方外之佳境而鄒魯則異升由之堂入孔之室者知之非尊榮盛大之謂也嗚呼及肩之牆兮吾窺數仭之門兮吾倚負牆而立者霧涌雲移訖不知其中之何似爰出二物白犬丹雞指河以誓期子境上有進無已先入其境者必相為言之八詠樓賦融火謝梧葉飛碧雲暮靈雨晞烏有客卿目迎歸鴻相羊依遲悼夕隂望崦嵫送日車招月妃于時天漢焞焞明河澄徹烏夜啼璠燭滅沆瀣生丹露浹颸風來飛音絶偃蘼蕪動巾箑微雲解金波發露井飛霜隂渠沃雪凍樹連花封條屬葉瓊辨盈牀玉塵生襪于是解羽衣被須捷發妍唱歌皓月傷令德之未崇怨急景之凌奪胥靡先生過而詫之曰風月無際而客得之所謂庶人之風月也極目之樓迎華之觀在城東偏玄暢之樓出其西南背梁涉宋不知紀年南樓黃鶴聯鑣方輦黃樓白雪並驅爭先登斯樓以馳明長風浩其吹衣瓊璧霜寒丹艧霞披重橑攢羅欄楯巖巍桷怒栱走柱浮棟飛椽欒涎涎楶棁熺熺西榮隱乎琳房東榮昭其梁麗閈閎在其北際饔舍出于西垂户朱殷兮初日升瓦積翠兮朝露晞飛雲繫乎簷牙芳塵屬乎榱題清樾以為簾薄逺林以為罘罳與觀同榮非譙而麗顧風物之清新瞰市列之闤闠雖有庶人之風月將無以容之也客卿曰室則盛矣美矣彼何以為容室之地耶曰城樓所屬山澤效奇其南莽平綿地百里落脈兩端大川交至退不夷漫進不迫匱畦畹皓其紛績金沙及于河麋迫而玩之則倒影在庭水紋浮袂若泉之榮若波之詭釣車離合行艓棲遲亦有屠釣隱淪仙舟暫駐張志和之艇東來李供奉之帆西去錦袍之影未寒欸乃之聲在樹水鳥沙禽無今無古其北則金華石室洞玄之天珍林建木蔚蔚漫漫若張羽蓋若立曲旃紛青繚碧蓊薆芊眠延目視之則水光山色融液轇轕乎其前非煙非雲非埃非霧豳玢青熒㽔綏扶輿若霧染空若景涵虛入閈閎溢餘胥屬上榮周步廡排飛闥冒綺疏度懸箔依硐户摶之不得攬之非無招之不來麾之不去得之者不綺錯而雕麗值之者不塗澤而改度此人間之爽塏山澤之清暉所以娛人者也子能從我而閲之乎曰髙明之具玩時愒日志士所畏請言其餘先生曰東陽之牧江左英偉蕭子雲之翰墨百金一字離鴻脫手驚蛇落紙豔動行間金生字裏吳興玉唾見之失色漁陽艷曲為之褫氣而沈謝之在越中也翳白雲訪芝髓胹明月以為胾縷光風以為餌剸裁楚豔鋪張漢侈拾趙帶之餘妍出燕裾之華詭錦官取其光榮雒花得其富麗若磔鸞鳳于黿鼎屠飛龍于牛几種光璧以成煙解佩璫而取淚大厯之子獻譏建安避其精鋭者也今都司集賢之墨未乾會圃登臺之詩在耳客惠顧焉而審定之其視開元為何似也客卿曰蕩子之春華雲章之清玩非所以崇德也請言其餘曰石室硐井謝君之域赤誦之宫蓋金華玉竇處乎北際鼎湖太鶴出于南中董方成趙廣信之窟宅又參錯其西東羣仙羽會曄如芙蓉虛步霞起振衣為風目留鸞鳳氣使飛龍青骨緑髓碧矑方瞳四體集為琅玕虛白生其心胸開陽斂秋與元氣均六天為羽八極為門馭飈車馳羽輪遊汗漫從列真棲神不死之庭煉形三丘之樊丹砂鼎竈荆榛蕪沒砂雞走狗莫知其垠而光焰竊發金華朱殷碧雞乃晨疇昔之夜吾嘗登斯樓以北顧赫焉如熒躍焉如金大如車輪焜耀輪囷得其毫髮則無以墮襄陽之淚霑齊侯之襟雍門亦無慮乎池臺之堙者也子能從我而求之乎客卿曰金石之夀萬不得一魯多君子學無不殖業之不修其何能國耶胥靡先生色喜而言曰昔者晉在中葉謝公在位袁宏朱轓藹然仁風與扇俱南歷宋至梁沈侯保之以俾後賢至于我朝與廊廟之風混乎為一浩乎如川雖有智者亦莫能辨蓋東海之先民慕季子之風績故尊堯陳瓘之忠烈潘卿良貴炙之潘卿遺直司諌陳良佑得之而其遺風餘烈憲臺則之今謝公之風不泯而益不落而殖抑外憲之力耶客亦聞之乎否也客卿乃蹶然而作周旋里巷臨顧山溪問故老之緒言昭前修之風軌蓋沈侯方盡瘁于東陽而梁王已撫帶而傷己今歷年八百金銷石盡城市皆非而謝公扇上之風至今不墜自沈侯以下有賢大夫繼之也不然則庶人憔悴雖有風月烏得而食之今天下之言曰江山不惡胡不勝衣彼徒知東陽以風月而消瘦又烏知其庶民以風月而瓠肥也哉遂稱歌曰明月為燭兮吳越千里夫何解帶槃礴兮言不及帝抑君臣憔悴未嘗相謂耶宫中故帶不以示約欲誰示耶吁嗟乎黎庶之肥東陽之瘦梁王消瘦天下之肥也舍東陽而相國則侯之肥瘠未若是而已耶于是胥靡先生起而為亂亂曰飛觀硉兀城東隅兮蘭堂豐屋交綺疏兮繡衣金節玉唾壺兮渠黃紫燕油壁車兮飛蓋搖裔風清途兮瓊纓華綬照碧梧兮花壓玉炊雕胡兮手揮五絃罷吳趨兮長吏著白兮疲民蘇牒訴簡寡兮圜空虛水雲在栁兮日在榆風乎大澤兮歌唐虞節婦賦建寧吳家世忽不踐兮情靡薄于魯縞狹節性而賤名檢兮誰與守志而厲操侵欲崇侈兮毁信棄忠衒玉賈石兮智力以為雄傲明德以掩義兮當官以放濁為通衆竊步而翳行兮為名教之所容玩細娛于一旦兮亂前修之風度雌黃落而唇亡兮曽氷鑑之不可睹鬚髯蔚其如戟兮有遺憾于古之烈女彼釋生而取義兮彤管列于竹書榮曜赫其相宣兮為百世之楷模夫何末流之不競兮蘭蕙化而為芻謂人各有偶兮傷未亡而獨居思來日之苦長惜華年之未渝獨竦踊以待旦願長處乎脂腴語刺刺其猶在兮遂捐棄如脫遺雲泥忽其異迹兮連環解而玦離槿花以為心兮曽何足以平髙臺與曲池孰不悅其春華兮于秋實之不可期世靡靡而不反兮時所廢其莫支士無以美七尺之軀兮夫烏責乎房帷揚五教以經邦兮慨淳風之永息傷露竹之無筠惡丹青之改色嗣潛德之孤光夫烏覩乎人倫之幅尺于閩越之深阻兮有當代之女英懷鐵石之深衷兮配玉壺之清氷殆天授之以徑節兮左貞姬而右陶嬰宜受祜于天朝崇里巷之休聲主君邈然而深思兮曰豫何德以辱邦君之嘉命子辭家而來歸兮遭夫子之不幸顧諸雛之煢煢兮于附翼之未成思奉身而逺引兮托孤雛于飄鷹豫敢辱先人之教兮以一身而事二姓願灑掃于地下兮知待終以可榮斯女子之檢押兮非進修之行也衆好名以矜賢兮固昔人之深恥既相詬以簠簋兮又相覿以徽懿飾浮華以為巳目兮每發背以沾衣黃流蕩而稽天兮引一丸以障之取磷火以待明兮謂朝露之繭可以為衣振一羽之毛兮舉黃鵠于千里張兔罝于芳林兮夫烏取乎虎兕與熊罷無妾等百數兮夫何闕乎今之世顧皇極之不建兮是烏足為經逺之計也夫婦人之行不表于當世兮况處常而待終以榮名為不祥兮猶足以繼古烈女之芳風系曰金葅蘩兮白露未晞履聲絶兮庭有緑滋幽夢徘徊兮碧瑶樹黛光零落兮青蛾眉努力兮自愛淳風兮可期迎華觀瑞蓮賦銀谷山人秋食蜚英夏居荷屋瞰玄林蔭珍木援風枝依露竹解佩薦蘭分流互緑繞蝶圍蜂量花以谷愛萬物之光輝遲丹榮之綺縟於是鬱金在栁丹入春荑冶葉倡條凌亂紛披縹蒂丹膚雪骨霜㽔染金稜以為碧添膩紫之紅滋亦有蟠桃緗梅碧李楞梨購玉蕊于三秦來戎王于月氏分朝家之藥樹進百越之扶荔出平泉之鮮藻致玉李于琳園靈瓜兮崆洞紫杏兮三玄又有冥海如瓜之棗昆崘百子之蓮銀桃碧藕朱梅玉蘭英㽔纂纂艷實酣酣春透餘胥落蘂闌干歎舜英之歸華玩朝花之小蒨於是知微子過而咻之出瑞應之圖而謂之曰子能致名花美石而不能植朱草與金芝人能致嘉蓮瑞木而不能使生于林池子獨不見昔者淮陽金帶之圍海右芙蓉之嘉瑞乎觀其庭闈清峻渌水涵虛公侯至止靈苗日敷自公銷夏翠緑丹朱飛鳬為之拂舞朱鳥為之翔翥藻縟相輝風翔雨儛外之則素質流丹垂葩接跗內之則紅銷白越鬚聯齊縷金粟在鎔脂澤迎露玉琢相思之心包約流黃之素聯珠微漲金膏如汙花房旦開天香微度莖裊銀篁之管隂聯翠羽之帷綵雲墜則宓妃遊女之凌波雨勢酣則優人索寒之浣水至其魚浮積翠日在蘭芷又若秦王懸鏡而色動樊劉唾盤而成鯉披叢凝睇連芳具美弱鬟雙綰金枝對起若嬋與娟兮方駕英與皇兮倚竹又若女同居兮蘭心禽宛頸兮河曲朱鷺將飛而目成媚蝶接影而相逐罷單鶴寡鳬之奏辭别鶴孤鸞之曲連䨥禽于一縱配繁弦之雙鵠寶勝擬之而翻飛鏌鎁繼之而來侵相逢之樂成聲聯臂之歌相續豈比夫東百勞而西燕背面傷春而獨宿者哉觀乎氣韻生動一花二妙晞金澱以飄丹出公侯之池沼此非地産是謂天造造不自天自帝有詔蓋盛德大業之在公物莫掩其光耀而英華外發從公所到故奉詔朔方則見之朔方命之十道則見之十道問之花神而莫余知索之主林而莫之效香繞洞玄之天而赤松攬其餘照是豈人間之香艷吳兒之花草也耶山人曰吾聞德之厚者無薄發占其源者視其委蕃釐作合于三神觀禎何有于東龜蓋兼而兩者蕭曹之將相實連錢者王謝之子弟藹薰胥以為祥無但以花木視之也于是緒言未既民有歌于途者曰水花兮蕊蕊祥風兮佳氣非動非植兮從公而至藕方舟兮不足為其廣逺花百尺兮不足盡其巨麗抑南枝出于東海之上而北枝出于鳳凰之池者耶山人悅之使反之而和之曰桑麻靡曼兮禾黍蒙蒙吏清素兮年屢豐民食其實兮春華在躬抑袁宏謝安石之仁風歟沈隱侯之春風歟李夫人賦漢李夫人既沒乙帳成寒蘭銷曼宇脂澤無華皇情弗豫怨反生之不靈遲所思兮遲莫顧羅綺兮成堆撫瑶席而不御熊蹯謝美露鵠非腴玉冷柘漿莖晞丹露臨扇徴歌卷衣思舞縹玉笛兮聲轉悲璙碧樽兮無與佐傷寶唾之餘花恨黃金之莫鑄於是承明受詔百靈授職招錦車下軒液薦浴壺藉蘭席羽仗宵陳侍臣在側月照金缸流蘇五色靈風繞帷光儀可覿皇帝撫今懷古悲喜交集顧謂枚乘曰陳大夫之麗藻輸豫心之愊抑緣情率禮為豫賦之乘曰唯唯若有人兮望宸幄行姍姍兮綬若若顧帳殿之未移感芳華之榮落冶步弄姿映華迥立形迭成光綺態艷逸逺之若綵雲之方興近之若珠樹之在室曄曄乎若晴花之倚草娟娟乎若華雪之映日丹荑並秀璚枝共新顧李增穠懷芝比潤髻環百合香傳五藴玉色成丹長眉入鬢晞光髮九回之膏承露華百英之粉希蛾染桂傅齒編犀鬢隨衛巧腰將楚細艷與華兮爭春目橫波兮剪水昔宴惰以為虞兮今烏取夫衆媚方鸞鎩翮當蕙羅霜旦溫室之背秋夕露寒之迎涼飇車無羽漢津無梁苔痕暗上黃金印緑塵飛墮合歡牀顧今夕為何夕兮共珠璧之夜光翹分翠羽衣縷鴛鴦條脫如縈雜佩截肪綴石榴之華鈿兮垂傅珥之明璫曵翠雲之華袿兮襲鬱金之羅裳委夫容之裙叉兮緝繁繡之偏諸衣金錯之襠襦兮曜緗綺之襜褕揚衡微笑宛轉躊躇懷華萼之連枝兮非直以悅已之故也寧趨死而不一見兮有不死之具也姿采如新穠花如故乍見乍泯出有入無望椒塗而不進旋却立而引去冀芳訊之一陳兮蓄瑜辭而不吐朝為終南之雲暮為渭川之雨瑜珥在几茵馮在車芬若未寒薇帳在華翰有點蛾之緑奩餘漬粉之瓜情脈脈而不一言兮紛瓊瑰之盈懷昔為琴上之琅玕今為空中之玉叉君心無所終薄兮使春帶之轉賖乘鸞有侣拾翠有儔招漢女于璇淵命洛妃于春洲擕玉薑以並來挾緑華以共遊上可以攄君王之邑邑下可以致芳意之綢繆何忽來而獨往兮使騖望以增愁色似是而情非兮曽不肯乎少休同車之子艷非世有曼姬在左白台在右協律悲歌而撫節兮悅慶雲之光覆美人一去而長存兮何必戀戀以為已憂也美人笑夫春華兮春華謂非吾偶彩雲一散而無質兮華一夭而莫豫留美人死而不死兮華見之而懷羞歌曰陳寶衣兮散璠燭君不來兮輪兩角間何濶兮去何速誰與來兮兩鴻鵠雄髮春深緑轉銷秋塵日暗黃金屋君王愛玉體無使沈心曲帝又歌曰絳縷銷兮百子池蛾影散兮明鏡飛日昧昧兮損容輝來如雨兮青蛾眉光塵莫豫羈異香出豫衣心悅子兮非令姿懷故心兮勞望思何姍姍兮其來遲折蘅蕪兮復來歸於是司馬大夫起而為亂亂曰罷回波兮停白雲朝華蔫兮玉枝折玉既折兮汗未晞望美人兮青雲霓斷夢殘香翡翠帷苕華玉上餘芳字海外殊庭未可期更待承華青鳥至垂絲海棠賦幼余愛此春華兮閲草木之文章左光車而右服馬兮飲余菲而食余芳于時青氣流輝榮生佳植天集纍巧雨標五色抽神緘與鬼祕宛葩刓而蕚刻沃紫淳紅抽黃添白比秀推榮莫之省識惟春皇之盡藝兮有海上之名姿方梅花之雨别屬杏艷之雲乖被春澤以成光兮表獨立而大奇于是羣芳沮廢不知所營桃傷李仆讓為先登雖體裁么髍而態有餘榮麗不廢清纎不傷陋夫容袤丈洛花盈斗桂華明密山礬孤瘦清不掩纎穠傷豐茂穠纎失度度一作中兹花則否花必待族共氣分榮取蕚紅梨借跗山櫻儷美聯芳為花之選未若他花解手背面鄭綿染色魏花薦紫來禽木瓜擬之非是伊浙河之佳植信羣離而類絶丹徒芳裔名均種别宣華麗質風馬不接蓋其為狀也蘭秀同柔蕙華並弱委藍絲而綴花垂彤粉而點蕚若四體之無骨睢匍匐于秦槖頭搶地而不舉遷對吏以增愕始而望之則輝鄰珠樹色比紫煙非雲等潤丹露均繁若處子之穎秀兮方春睡之爛漫挾春嬌而無力兮色韡韡其可餐其少進也春透緗枝芳苞微解秀外朱融黃中金赭黼藻林池金玉芳榭爾乃湛酒溷殽徘徊清夜紅粧翠袂效奇樽下香芝入座桂燭流華播明安于密熖同夜笑于缸花時乃操觚成詠醉墨垂葩才華比秀縟旨同姱及夫紅芳滿國香雨轉繁扶玉闌而欲壓傷桃李之盛年方玉啼之承臉又嫣然而破涕酒色未消玉色微起故月新日朝改夕異歎解攜之無幾兮恐雲散而風流忽墮環而遺帶兮遡風亷而並遊曽青陽之未艾兮怨花時之末暮吾方尚友于名芳兮又遽先于朝露羣花紛其啼笑兮嵗復嵗其逼人雖不言之桃李兮猶暗擲于春心繄明艷之藻質兮將感勾吳而靡楚君何兹花之絶俗兮甘與蝴蝶而同夢起拂衣而髙謝兮羞與悅已以為容朝吾遊于平林兮見丹鉛之滿地雖壯夫其猶扼腕兮鑄黃金以為淚忽百端之交集兮折遺榮以搔首歎光塵之阻奉兮臨春風而舉酒指朱鳥以為期兮致芳情之扣扣于是徘徊起儛以為迎繁送謝之歌歌曰歸華落兮丹秀分轉穠艷兮清路塵委春事于蔓草將奈何兮愁傷人座客聞之又續而為迎繁之歌曰景已絶乎迹已徂問花事兮無有餘雖舞袖之翩翩幸嵗期之未渝思投分兮寄飛仙無遲子兮長愁豫嗟周親兮狎友髮易華兮嵗易除朝榮暮已悴兮保金石軀鹿皮子集卷一
