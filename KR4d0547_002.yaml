body:
  text: 鹿皮子集卷二元陳樵撰樂府出塞曲為戌潼關李總管賦屬鏤夜啼光屬地將軍一出欃槍死行塵不動人歸市帶甲如雲自天至取君甲馬為君洗分明䄂有銀河水手中遺下泥一丸不封函谷封泰山夜䦨曲碧宇星回夜漫漫靈蕪煙暖重薰薦冷翠香銷青桂枝氷荷蓋光光繞帷花樓艷舞金萎㽔吳羮蜀酒精瓊糜酒䦨半解龍綃衣春朝曲渚問鵾雞海人謡海南蠻奴髮垂耳朝朝采寶丹涯裏夜光盈尺出飛魚柏葉雙珠寒蕊蕊幽箔連錢生緑花切玉蠻刀如切水九譯來朝萬里天北風不動琅玕死望夫石征人執㦸天西北十載功成歸不得何不忍死待我君我君化石秪化心東飛伯勞西飛燕題飛花亭東飛伯勞西飛燕花光絮影從風轉蜂黃蝶粉照靈葩不散明珠祗散花霑衣墮袂花如雨羽人化蝶隨花去與人下顧笑春紅春閨一昔生秋容一作吳蕉未省生秋風骨齊熊耳君知否花艷春暉不經久羽衣一拂千萬春春花墮蕊齊崑崙中秋月銀漢西流烏接翼回首人間化為碧瑶臺月裏可避闕三郎錯路歸魚鳬霓裳月裏親偷得却怪李謨偷擪笛寒食詞綿上火攻山鬼哭霜華夜入桃花粥重湖煙栁髙插天猶是咸淳賜火烟行路難褰帷取流蘇流蘇不解連環解離情别思出君懷教人枉結流蘇帶作書報天孫河翻浪動七香車折伊蘭兮捐艾蕭伊蘭化作榛中草美盼何須比目魚六翮安用頻伽鳥文鴛宛頸奈枝連不如見月生羽翰虞美人草詞美人不願顔如花願為霜草逢春華漢壁楚歌連夜起騅不逝兮奈爾何鴻門劒㦸帳下舞美人忍淚聽楚歌楚歌入漢美人死不見宫中有人彘七夕宫詞內人拜月金鋪户鳳宿梧枝秋葉下露華入袂玉階寒織署錦工催祭杼月下金鈿照骨明同心絲鱠紅生縷素爪碧寶上華樓夜䦨飈馭下銀州鴈來紅東朝一書成百戰上林一書旌節返誰傳驕子一函書人不如禽知慮逺自從燕滅秦晉亡是非直到空中鴈蘇郎寒絶鴈來紅腳下胡姬殘綵線願燕在北秦在西鴈去鴈來無是非五言古詩清隱亭白日照陽春九陌揚逺塵往來酣蟻戰誰是投閒人人生苟知足政復貴隱淪萬事等大夢汨沒徒艱辛所以賢達士不肯勞其神結亭林泉間歸來養清真窗虛野鳥狎樹密山猿馴草色上階秀花枝倚檻新俯仰有佳趣樽酒時相親終然逺塵俗不愧無懷民雨香亭花香不因雨雨過花更香氛氲入几席馥郁侵衣裳恍疑爇沉水輕煙逐風揚此時鼻觀通百慮都已忘願携白玉碗掇英挹天漿灌沐紫金丹卯酉滋芬芳服食養精魄一息三千霜絶勝仙掌露灝氣凝秋凉悅心亭清晨攬衣起感物暢我情春風從何來草木忽已榮深池躍游鯈喬木遷鳴鶯俯仰極萬類氣機足生生哲人貴冥㑹悠然竟何營此樂難具述酒至且復傾答李齊賢言别古來青雲士論德不論年及時揚意氣車服耀且鮮譬彼桃李花逢春各爭妍胡能學蘭菊遲暮秋風前羡子富年華文思如湧泉詞場早騰譽海內推英賢而我竟何為著鞭苦不先賦命有遲速行止任自然吾觀鴻鵠飛低回未須憐㑹當振六翮髙舉摩青天題松澗圖鬱鬱澗上松磊磊澗中石石泉有餘韻松枝有餘色髙人事幽討結廬此栖息欹枕聽潺湲開軒盼溶碧俯仰欣有契足以愒昕夕我亦厭塵囂久焉慕岑寂他年倘相過勿謂豫生客送李仲積北上圖名當入朝圖利當入市丘􅊤多賤貧胡為久留此入市不圖利入朝不圖名不如丘􅊤間逍遙抗髙情白日從東來忽焉向西沒急景易蹉跎紅顔坐消歇鼎鼎百年內已過四十春借問百年老能有幾何人縱使創還丹可以長不老志士惜分隂立身亦不早回首望堂上慈親雙鬢皤得祿奉榮養其如遲暮何絶裾固無取負米良足美違離膝下去豈比蕩游子峩峩黃金臺鳳詔求賢才君行㑹有遇名成早歸來把酒把酒勸白日日車邈難攀朝來出東海薄暮沉西山東西若循環來去無時閒何如延光景使人駐朱顔題鄭仲東明山鑿池曰靈淵鑿池得清泉泉清乃見天寧知天可見有自未鑿前池泉一何靜天體一何圓仰視天廣覆俯察天在淵俯仰倐上下孰得知其然至人有真見不滯方若圓百慮本一致萬殊同一原淵淵與浩浩信匪言可宣天運妙不息君子貴乾乾孔聖有明訓請子觀逝川送吉甫北上之子氷雪姿冥心學仙真官卑且勿念况復憂其貧邇來太白山山勢凌秋旻雲盡月照夜花開鳥鳴晨閒居少公事猿鶴為比鄰探芝過林麓釣魚遊水濵七年不得調幽興如逸民通塞任物理聊用安此身憶昔始相識交情日相親聞君錬藥說祕之不肯陳金液且莫採何以製水銀豈伊蓬萊中無分追後塵君今别我去九闕朝帝宸功名信可就慎勿煩精神閬風青峩峩海波白粼粼他年重㑹面笑盼桃華春雙柏題畫亭亭山上柏柯幹如青銅蒼古拔俗姿肯作兒女容風霜日搖落萬木為之空爾獨不見摧屹立如老翁乃知歸根妙生意恆內融願乘雷雨興化作雙飛龍蘭竹幽蘭生石間隨風播芳馨埋沒荆榛叢獨自全吾貞南坡有新竹其葉何青青居肰得所托樂爾君子名瓊林臺上清瓊林臺似有千仭崇琪樹交柯生瑤草亦成叢幻境類𤣥圃凝輝接琳宫天花或時墮縈紆揚回風仙人薛卿手持玉芙蓉傲睨八極表洞見萬象空飛書約王子弭節延赤松步虛朗歌詠流響入雲中樵隱圖二首清晨執柯出負薪薄暮歸豈無登頓勞獨與憂患違山深雲冉冉樹密芳菲菲猿鳥久相狎世事俱忘機買臣昔採薪頗似逺名利何事五十年却復懷富貴古來樵牧間多非隱淪地寄言謝君子無使心迹異送兄遊姑蘇二首浮雲渺天末隨風恣悠揚游子四方志去去道路長手中三尺琴朱絲泛宫商但恐和者寡使我心增傷寒風變衰草原野正蕭條馬嘶人影亂落月在樹梢姑蘇四百里未憚跋涉勞遙知黃鵠舉六翮凌雲霄送蘇吉甫館于穆千户家歸先生來東陽已是一載餘深居謝賔客閉户只讀書青燈夜檠短黃卷秋堂虛咿哦不知倦經傳為菑畬玉階未投足侯門姑曳裾枚乘終顯達馬周豈迂疏願言崇令德努力無躊躇他年二三䇿待詔當公車胡伯玉隱趣圖四詠蜀錦屏朝看花中仙顔色媚且鮮暮看花中仙顔色忽己蔫紅芳不足恃青春政堪憐人生宇宙中壽無金石堅百嵗等瞬息業火徒熬煎何如鍊金液返本得長年晚香徑秋菊有佳色幽香知為誰蔚為霜中傑肯向露下衰獨賞心悠然酒至觴淋漓永懷陶靖節髙風邈難追嵗寒亭夕隕悲蕣華秋零悼蒲栁急景不可留髙風邈難久風霜十二月松竹凋獨後還與嶺上梅結為嵗寒友草木本無情猶能同嵗寒奈何市井交輕薄不足觀竹澗亭修竹䕃幽澗築亭留隱君隱君去已久何人躡清芬撫弦變新聲感慨萬古情不識翁玉潤不識翁氷清煙林暮蕭蕭風水秋泠泠故交難再得兀肰空舊亭同陳子俊暮秋遊耆闍山時九日後節季日月淺山川凋落繁志士惜遲暮觸事念慮端同遊得佳士散懷逐躋攀匆匆萬夫內乃有吾子賢英特奇偉姿筆精語亦溫暫逺欣已遇當憂亦為歡步屧得古寺入室清心源草枯石色出層構隂崖緣猛虎昔夜吼發石存幽泉至今連筒飲頗厭井汲艱佳節去我久黃花有餘妍愔愔夕鍾罷草草尊酒殘客子已山際落日猶樹巔舉世塵漠漠朗咏山中篇七言古詩長短句宣和滕奉使茂實縣人鴨緑少年驕不舞大梁花石春無主天與遼人十四州四海九州非漢土漢使相看墮節毛烏鳥黑頭羝不乳舊時别贈楊栁枝插向雲中今十圍蘇李泣别圖祁連山下空弮折啼鳥入夢頭如雪胡越相看十九年今日輸心為君說窮兵未必來逺人居闕可馴天驕萬里來稱臣他年陛下知臣心送厲生之天台劉郎洞前藥草肥年年送春春不歸劉郎採藥路不迷路迷却是還家時人間藥盡採者稀醫師採藥歸未遲終南捷徑莫西去正在劉郎路迷處贈拆字蔡生至順三年苦寒月梅月不拆梅樹拆今日蔡家簾肆前拆字拆作風花裂書生貧病字撑腸識字不識煮字方字字拆來方可煮煮作吳中菰飯香我今林居交木石妖祥禍福無留迹六畫吐盡一畫無豈復有字從君拆古人作字留世間因君破碎斷復聯此術若在造字年未成已拆何能傳寒江漁樂圖菰蘆滿眼沙際天寒林古樹凝蒼煙長河不是天上來懸河滚滚生筆端魚龍半隨風雨去舟人漁子空茫肰畫師胸中吞萬有吐出雲夢常八九和楊亷夫買妾歌劉郎持玉笛再入天台山天台女兒不相見採藥直入桃花源劉郎吹笛花能言雲離雨别三千年青矑橫波髮鮮碧藍紅染作夭桃色劉郎今姓楊相逄便相識金條脫龍縞衣飇車木鳳凰飛下鐵山西蒨桃拂面丹如雨紅蝶黃鶯解歌舞桃源無路入人間一身金翠來何許玉山子莫將迎方平㑹麻姑參語無蔡經飛仙不入風沙地無端夜過昆山市三滌腸三洗髓絳雪𤣥霜玉池水代嘲舊人吳王臺前天地老羊家吹笛烟花繞羊郎到老不識顰昨日西施顰更好妾行自綰春風髻姊送出門車在道塗金兩䄂石麒麟姊唾乾時碧如草唾花一夜滿妾身云是背後悼夫人代答新人妾來詠栁三月初美人未字楊栁枯美人脈脈金芙蕖不泣前魚傷後魚阿嬌黃金不復餘白頭曲成銀筆書曲成未用銀筆書相如明日刺相如代玉山子答建昌老父吹羌管背花吹盡風花片雪中花老花未知我起開簾納紅燕夏姬出境春爭妍房老不出金谷園花奴鼓急人人顧砑光帽滑花難住題竹隱軒已下四題為胡伯玉賦繞軒修竹幾百竿瀟灑迥若仙石壇黃金瑣碎夜月冷碧玉蕭瑟秋風寒道人幽居坐其間漠然塵紛不可千徑節攜為手中杖散籜裁作頭上冠市朝富貴多憂患山林曠蕩聊盤桓七賢清修誠足慕六逸可學夫何難有時夢見瀛洲仙鞭笞鸞鳳遊無端叩頭再拜乞靈藥使我容貌無凋殘仙翁贈以九轉丹服之兩腋生羽翰逍遙物外有餘樂何因報我青琅玕待月壇憶昔待月錢唐秋眼寒桂樹枝相樛桂枝半蠧花不實折之不得令人愁帝鄉幽燕邈吳越還向山中弄明月聞道君家待月壇壇空風露何漫漫便欲因之遡寥廓倒騎玉蟾飛廣寒廣寒宫殿殊清絶素娥嬋娟皎如雪笑指桂樹對我言留取髙枝待君折待君折須幾時明年八月㑹相見付與天香第一枝天香臺牡丹百本新栽培纍日為築天香臺春風三月花信足深紅艷紫參差開五色卿雲色紛郁九苞舞鳳毛毰毸也知東皇愛嫵媚何須羯鼓聲相催蔗漿初凍瑪瑙碗酒痕微汚玻瓈杯雙成未逐阿母去弄玉却伴簫仙回還憶開元天寶時沉香亭北君王來霓旌翠節導雕輦繡帷綺幄圍香埃倚欄只許妃子並徴歌或詔詞臣陪陳迹如今安在哉風雨滿地唯蒼苔相傳尚有清平樂翰林供奉真仙才蜀錦屏先生新辭白玉堂晴晝衣錦還故鄉鄉山草木被光耀化作錦繡成文章花神驚視不敢當此花非我山中芳初疑寵渥出祕閣復道榮恩來奉常雲蒸雨濕春風重至今猶自餘天香願將歸院金蓮炬移近圍屏照艷粧題海棠東風吹墮緗雲影别院春遲宫漏永繡幃寶帶綰流蘇夢入瑶臺呼不醒熒熒銀燭花蕊多城頭烏啼奈曉何石溪歌為石漢和尚作石溪一滴水本自明河來明河倒㵼箕尾濕千里萬里喧風雷小龍挾向雲間過水滑瓢欹誤傾墮蒼崖一息裂清泉似是巨靈新擘破南州衲子天下奇夜撑鐵船欲渡之珠船照耀明月冷赤手拾得珊瑚枝又復揚舲向東去直到衆流歸一處東方火發海影紅金烏飛上扶桑曙香雪壁我欲借君香雪之素壁障豫山中玉雪之空亭亭空壁素了無物惟見虛白一色洞杳冥宴坐契元始忘世兼忘形嗤彼塵俗人兩眼那能清蓬萊之山仙子窟玉作樓臺銀作闕豈無瑶草弄朝烟亦有瓊花迷夜月羽衣道士乘素鸞引手招我青雲端翩然髙舉遊八極下視五嶽烟霧何漫漫題騎牛讀書圖朝看書騎牛出去日上初暮看書騎牛歸來日欲晡朝朝暮暮看書卷還慮牛饑無牧芻家貧本分辛勤過平時敢望閒工夫人生衣食皆有餘棄之不學將何如胡伯玉隱趣園君子池五月菡萏發紅粧明緑波君看池上水何似若耶多若耶女兒歌艷歌輕舟短棹相經過傾城顔色有人妬日暮凉風知奈何五言絶句勸兄弟十首田氏好兄弟初焉念少差一朝仍㑹合荆樹再開花鄴下然萁句淮南布粟歌相煎容不得奈爾二人何何苦毫釐較當思手足親丁鴻與劉愷讓國是何人鴻雁天邊過脊令原上飛尋聲還顧影次序不相違父慈子必孝兄友弟須恭倘使誠心在如何不感通連牀聽夜雨長枕共姜衾棣萼相輝映何憂外侮侵金昆與玉季和樂奏塤篪氣象自然别淳風復古時生來同一氣兄弟是天倫祇要長和睦休論富與貧友愛言無間從教耳屬垣怡愈崇遜讓寬厚福之源古有難兄弟今無好弟兄何由風俗厚凡百近人情新凉二首夜來窗戶凉一枕聽秋雨曉起絶飛埃門前有流水雨將殘暑去風送新凉至安得歸夢成長夜愁不寐蘆雁四詠飛鳴宿食肅羽遵寒渚渡江蘆葉黃誰云南去逺不敢過衡陽萬里西風急送書時一聲從教驚客夢可待主人烹沙汀棲處穩夜漏有奴看月暗蘆花白一身秋夢寒飲啄殊自得水田稻粱秋寧因謀一飽失却網羅憂越上寶林寺八詠飛來山寶林從何來飛空錫同住天風吹海濤常恐復飛去應天塔浮圖成再世嶪岌髙入雲妙應人天果鈴音上界聞靈鰻井巖穴如深井滋潤通海脈靈鰻久蜿蜒嵗事時有獲羅漢泉應真曽卓錫百尺井泉深汲取天人供泓澄印佛心大布衣河涼大布衲七帝師道德流傳五百年未滅針線跡古鐵鉢鐵鉢生古色曽經飯胡麻黃龍此降伏更長碧蓮花深竹堂禪宫庭宇靜深翠萬竿竹忽悟瓦礫聲香嚴道機熟盤翠軒軒楹越中秀軒窗四面山紅塵飛不到長共白雲閒除夕今年盡今日明日是明年客况蕭條處春寒雪後天題畫叢竹幽禽露節老愈蒼烟叢寒更碧野鳥何處來㸃破九秋色送李仲積北上北上京華去名成幾日歸春風折楊栁離思兩依依雪景小舟乘興來興盡便回棹夜深雪更深何須見安道七言絶句雙峴兩峯削玉倚青天一水分流碧漢邊好境直須真見得莫將圖畫看山川送孫仲明尉再到東陽省墓歸太原二首游子思親日九回首丘無計轉堪哀故人相見休相問不為東陽酒好來西風老淚斷人腸滴死墳前草樹荒明日還家重回首白雲何處是東陽桂黃金蕊密露華重碧玉枝交烟影涼今日蟾宫親折取人間無物比天香贈馮東丘一曲鳴琴一局棊一瓢新酒一編詩幽齊風月清無限莫問流年有盛衰送人之樂平鄱湖千里趣行裝野水閒雲路渺茫解斾旗亭春水薄不堪回首憶東陽含暉亭山色空濛翠不如平湖長繞野人居湖堤好種垂楊栁取次持竿索貫魚石拳石當軒玉色寒雨苔蝕盡鷓鴣斑也知好事無真見不看真山看假山山水青山如髻樹如麻茅屋青帘認酒家侵曉一番飛雨過滿川流出碧桃花江山萬里圖生憎李郭畫山川鑿破鴻濛混沌圓尺地寸天都剪碎女媧錬石是何年策蹇衝寒圖水際行人絶往來石泉幽樹太清奇揮毫對客無情意不似黔驢背上詩五言近體投外憲列職浙右饒名宦天潢異衆流星華婺女界印蘚越城秋長吏多佳政流人反故丘諸郎復為郡外憲此優游為政歌謡起論文鬼魅愁風霜臨外憲星宿繞東州身健都忘老詩清不為秋邦人好吟咏異代見風流山縣繡衣新前騶此望塵霜威重風憲秋夜候星辰帷幄多賢士觚籌托下陳空懷望外寵惆悵曲江春投憲幕上下六首星驛東州盡霜威憲府新古今從上下經傳獨紛紜子弟諸王選丹青寶晉親已知收俊彥也復惜餘人廣平新職業荆楚舊文章盛府芙蓉幕諸曹鴈鶩行賔僚嚴分限官事舉維綱千里無青草饑民正可傷顔巷端居日膺門屬望初芙蓉池不逺桃李地無餘霜雪歸行幕星辰近輔車不才汚盛府吾子意何如法曹新政績憲府舊才賢下客初傾蓋東州共拂冠無才供几案有術事虛𤣥柱下非明習吾知濟世難聲名沈書記亷白杜參軍千里風期合三才月旦尊辭章須爾雅幃幄厭深文秋興知多少黃花酒滿樽求學鄉人久為農嵗序更三秋收橡栗千里足蓴羮作吏真癡絶吟詩得瘦生諸公能指畫經訓尚縱橫投李息齊父子三首盛府聲名獨龍門地望雄懷文思慿几漫刺適為容翰墨千年事風流一世宗只今天下士猶幸識元公膺門桃李隂蘭砌近清芬不惜階前地祇慙俗下文筆懷蕭協律才慕沈參軍鴻鴈東南急饑鳴屬府君籍甚佳公子風流絶代無山中書扇帖江左折枝圖名世元暉畫傳家大令書登壇如肯授端欲曵長裾送里人都下省覲郎君向行在海岱暮雲深王謝金貂系班揚翰墨林應為洛下詠莫作越人吟父子知名後眉山直至今送蒙古教授郭受益歸洛陽匹馬金華道西風過雁初蓴羮千里地菰米九秋餘齊語傳聲澀巴童問字疏湯湯清洛水舊學復何如徐文蔚梅華橋上别見說尚臨池筆法承中絶名家比盛時猶傳徐浩體自寫鄭䖍詩已並漁陽帖休看陌上碑劉山南挽歌二首時儕通貴後六館竟如何不有東南事終期甲乙科泮芹吳子邑露薤漢人歌白社雙林裏西流淚作河漢閣文章舊天台草木深笑談無復日比興有餘音歷歷傳新作時時見古人有懷祇短氣何處識長身白鸚鵡開元白鸚鵡一作雪衣女長在玉墀邊宫樹棲應熟心經讀未全音餘西域語夢入廣南天莫把宫中事偷歸外國傳銀谷澗山房樓臺依水石石樹帶疏篁洞口有靈藥水西無夕陽天花空處沒春草定中長芳桂已飛盡有時聞妙香送沈教諭二首師友淵源正公卿譽望揚鄉閭仍未達世事故堪傷汗竹秋檠短羮芹午飯香祇愁雙鬢髮容易染清霜學舍山雲暗城樓海氣深文章初近古風俗遂如今冷署三年客亨衢萬里心須君明教法那得刺青襟題鄭氏義門二老連枝樹諸郎百子蓮同心無爾汝合族到曾𤣥化洽文明日淳還太古年名門人共羡家範世應傳次周剛善僧房牡丹韻二首不擬維摩室春風步障開欲分清露浥故近白雲栽色奪人間艷香從天上來韶華正繁富啼鴂莫相催憶昔仙春館春時每獨開公家今賸有僧舍亦分栽暖吹扶霞上卿雲夾日來可人看國艷卯酒不須催春日二首處處春風滿東皇信不偏蘼蕪窮逺目梅栁共新年白水暖浮日碧山晴吐烟清時多樂事敢擬卜居篇細雨花隂重輕烟草色勻驚禽長避客嬌燕却依人弦管紅樓酒跧蹄紫陌塵東風競遊賞因想杏園春雨四首山雨紛如織齊居晝掩門陸行憂馬滑船濟怯濤奔汀草今猶病園桃故不言游鱗忘浦溆直到槿籬根雲氣朝彌積濤聲晚更雄蛙生沉竈下人入漏天中稍覺傷生意深愁誤化工羲和司叱馭為擁日車紅風雨今猶惡誰憐行路難繁華三月景牢落一分殘稚麥應傷潦嬌花不耐寒江流方浩浩雲氣轉漫漫楚澤連空濶吳天極杳冥水添今日白山沒向來青鷗鷺乘原隰藜蒿翳户庭出門如未可試學衛生經送朱明德休寧典史二首今日休寧縣猶驅吏鞅塵直存吾道在清任此生貧燈火千家夜桑麻百里春因君重參贊民俗竟還淳吾子仍掩驥諸公漫薦賢長才操吏牘清興寄詩篇慷慨悲前事蹉跎惜暮年于公隂德在千載尚能傳送張仲舉歸晉陽舉進士六首籍甚張公子詞華衆所推門閭千里望天地一編詩花落山公宅雲寒杵臼祠看君歸晉日翻作别家時世業今誰繼瑶編自討論長材歸下吏吾子好斯文千里風期合三才月旦尊眼中今落落俗下正紛紛牽牛在南紀遊子上河梁殿閣終前席江湖且下方州閭無别業文字有他腸萬里關西路秋槐日夜黃長歌望吳越不道出無車明節固所尚清門難可居春帆移暮雨晚飯半江蔬何地非鄉社終期返故廬掛帆謝公浦把酒闔閭城江栁不忍折春風當别行關雲連楚暗隴月向吳生葉落長安道思君北問程矯矯凌雲賦纍纍白雪歌世人祇漫與吾子視如何誰預文章觀君冝甲乙科秋闈今獨立春興未須多黃晉卿見過却歸烏傷六首日下新傳詔江南共濯纓嵗中升進士海內右諸生經術謀王體詞章作世程不才岩石下回首望光榮古訓疇咨日文明闡化時君為萬家縣誰定一王儀名下看佳士人間見舊詩豈無清切地州縣有程期月裏丹葩逺人間杏艷張天官行故事風雅藹餘芳左掖親承詔端門出綴行眼明茅屋下猶見賜衣黃江雨間行人江干雨又新今朝下垂榻幾日望行塵氷雪鶯遷樹江湖鴈得春非君被軒鑒鑒一作冕懷抱欲何伸舊業推門地聲名出禮闈平生著風則長世有光輝官序須清績台衡起白衣談經無復日為别更依依花竹窮清玩山池屬素情荷衣隨楚製芹子入南烹已作歸屠釣終期變姓名惟應一丘壑垂白向升平春日題水軒菰蒲生户外翠羽落階前日出雨無影春濃花有煙汗青書在簡血碧淚經年丘墓池東北看雲日日眠送黃晉卿之任隴蜀衣冠盡中都魯一儒明時用文事榮秩映江湖為治須三尺起家祗五車天台山水地尚可曳長裾五言排律送烏經歷歸二十韻大府羅賔彥修門得俊賢明時優外任密畫制中權曉日卿雲麗髙秋白月縣千尋看壁立百錬識金堅殷浩名無忝崔羣美可專緋袍臨僻壤華髮憶流年山揖金華秀城當婺女躔民風仍皥皥王道故平平𤣥暢塵囂外芙蓉爽氣邊憲臺依翠柏幕府擁紅蓮法謹持三尺書應受一編公言歸可否德意賴承宣歙郡推遺直河陽贊巨川可能羞噲伍豈復愧盧前淵媚珠含彩林輝玉吐煙豫籌才婉婉歸思忽翩翩趍拜麒麟殿違離玳瑁筵幾時嗟蠖屈後日看鶯遷空遺參軍紙曽辭太守錢雙溪清若許明月送歸船鹿皮子集卷二
