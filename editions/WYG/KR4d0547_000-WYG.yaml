body:
  text: 鹿皮子集目録别集類四元卷一賦東陽縣學暉映樓賦閒犧賦卧褥香爐賦瑇瑁賦迎華樓賦胡氏鐵心亭賦月庭賦放螢賦太極賦蔗菴賦八詠樓賦節婦賦迎華觀瑞蓮賦李夫人賦垂絲海棠賦卷二樂府出塞曲夜闌曲海人謠望夫石東飛伯勞西飛燕題飛花亭中秋月寒食詞行路難虞美人草詞七夕宫詞雁來紅五言古詩清隱亭雨香亭悦心亭答李齊賢言别題松澗圖送李仲積北上把酒題鄭仲潛東明山鑿池曰靈淵送吉甫北上雙柏題畫蘭竹瓊林臺樵隱圖二首送兄游姑蘇二首送蘇吉甫館于穆千户家歸胡伯玉隱趣圖四詠蜀錦屏晚香逕嵗寒亭竹澗亭同陳子俊暮秋遊耆闍山時九日後七言古詩宣和滕奉使茂實縣人蘇李泣别圖送厲生之天台贈拆字蔡生寒江漁樂圖和楊亷夫買妾歌代嘲舊人代荅新人代玉山子答題竹隱軒待月壇天香臺蜀錦屏題海棠石溪歌香雪壁題騎牛讀書圖胡伯玉隱趣園君子池五言絶句勸兄弟十首新涼二首蘆鴈四詠飛鳴宿食越上寳林寺八詠飛來山應天塔靈鰻井羅漢泉大布衣古鐡鉢深竹堂盤翠軒除夕題畫叢竹幽禽李仲積北上雪景七言絶句雙峴送孫仲明尉再到東陽省墓歸太原二首桂贈馮東丘送人之樂平含暉亭石山水江山萬里圖䇿蹇衝寒圖五言近體投外憲列職投憲幕上下六首投李息齋父子三首送里人都下省覲送蒙古教授郭受益歸洛陽徐文尉劉山南挽歌二首白鸚鵡銀谷澗山房送沈教諭二首題鄭氏義門次周剛善僧房牡丹韻二首春日二首雨四首送朱明徳休寧典史二首送張仲舉歸晉陽舉進士六首黄晉卿見過却歸烏傷六首春日題水軒送晉卿之任五言排律送烏經歴歸二十韻卷三七言近體題建炎遺詔吕氏樵隱圖蛺蝶圖北山别業三十八詠太霞洞飛雨洞碧落洞蘿衣洞五雲洞巴雨洞梅暾石越觀陳氏山林春日雜興溪亭醒酒石翻經臺東白艸堂望月臺銀谷澗空碧亭少霞洞山居圁谷澗一作臺少霞洞作室圁谷澗少霞洞泰素壇招隠巗紫薇岩北峰石甗峰飛花亭水亭清凉臺忘憂閣南軒雲山不礙樓野芳園蘭池空翠堂山齋山園壺天鹿皮子墓遊絲臨花亭逺目樓蠟屐亭西峴峰涵碧亭上虞魏氏湖上精舍圖霜巖石室石樓艸廬哀江南效李義山慧力寺斷崖卷四落花圖空碧亭五首空碧亭老梅石磴菊菴山房秋色觀飛觀絶唱軒飛雨亭散菴麞谷麞谷澗伏蟾山寳掌泉尋春園雨望臺山館山莊琴臺飛花亭風香亭春日閨思席家洞石筍霹靂石跳銀溪書房圜春日題水軒樓氏雲樓分題送李齊賢三首綉衣亭占星臺半湯湖分題送李仲常江隂知事三首暨陽湖釣臺翠光亭詩林亭玉雪亭九首送蔡竹澗江山教諭送余善之歸瀏陽次王吉夫暮秋旅懷韻送盧經歴歸北金華通天洞永日觀拙齋心逺菴石廬雪觀三泉瀑布石礙樓少微巖西巖紫霞洞山堂贈蕭浣平寇次韻黃晉卿見寄之什臣等謹案鹿皮子集四卷元陳樵撰樵字居采東陽人介特自守隱居圁谷衣鹿皮自號鹿皮子屢薦不出専意著述是集題曰盧聨子友編輯不知聨何人也樵長於說經與黃溍宋濓等以文章相砥礪故造詣頗深所作古賦落落有竒氣詩則古體五言勝七言近體七言勝五言大抵七言古體學温庭筠七言近體學陸龜蒙俱能得其神髓顧嗣立元詩選摘其山遮春欲歸時路雁入鳬飛不盡天野鹿避人懸樹宿溪魚乘水上山來絮輕便欲排雲去花好多應換骨來諸句以為步武西崑然其精刻之思究與松陵笠澤為近至古體多見其醇臻侵同用頗乖古法近體多用洪武正韻尤不可解殆其入明以後所作故不得不從當代功令歟乾隆四十五年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
