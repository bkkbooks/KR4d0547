body:
  text: 鹿皮子集卷四元陳樵撰落花圖紅如肌血薄如鱗李下桃根五色痕拂地暫隨風絮轉繞亭不似雪花深人占碧玉名猶在煙盡黄金鑛尚存滿地丹鉛汚草棘何時凝緑遍丘林空碧亭五首晴光潭影共澄鮮雨外林隂色更妍碧海如杯誰縮地青冥著水誤憂天河垂澗底遥相屬斗入人間却右旋病叟年來倦登陟朝朝翫水夜聴泉長林衣被蔚藍光水樹重重䕶曲防碧落不隨河顯晦白榆却種澗中央石泉飛落萬漚發松影淡時千丈强我向北峰髙處下如何倒卓栁隂傍河漢縱横北斗翻縣泉激石起層瀾水流石上舒還卷月繞樓頭碎又圓龍火溼光生澗底仙人倒影落人間無邊空處無邊地盡入鷗邊一尺天星河水鏡自徘徊白石清泉是鏡臺人道月從亭下出我疑空入土中來崖隂水色濃如染風裏波紋熨不開一碧是天還是水池頭凉夜碧如苔樓臺倒影照虚明細浪鱗鱗去不停風舞翠綃浮畧彴月移黄素上軒楹蔚藍天近池深碧烏桕葉銷泥轉青牀下一波添一月青銅鏡裏一時生空碧亭老梅雲蒸雨蝕半枯槎空碧亭前雪一車曲誤掀翻簾外朶月移不動水中花十年春信隨風度半畝崖隂逼樹斜暮景無何水仙至萬花頭上欲饒他石磴磴平如席草茸香盛夏宜人石氣凉杜宇血銷添碧燐山雞食罷化餘糧赤松有約吾將老白髪無愁不解長醉則枕流眠枕石看雲不復據胡牀菊菴秋深紅紫滿秋籬蕙帶蘭英緑照扉猨飲澗中甘鞠水雲粘石上舊蓑衣月知人境來相覓花有心情死不飛桃李自開還自落却疑蘭菊未忘機山房冷雲堆裏散人家鹿幘羊裘不衣麻門外樹身無嵗月山中人語帶烟霞雲侵壞衲長生菌風斷遊絲半度花采蕺林深人不見連筒引水自煎茶秋色觀庭前丹葉映榆黄水傍芙蓉晚桂芳樹入畫來新著色山無錦裹只慿霜水中煙帶秋雲冷花上月如春日長不是風河千萬里不知何處覓秋光飛觀日髙空翠拂簾旌茅閣飛飛照日明銀色榜題章草字烏絲䦨寫越花名何須舉翮乗風去曽入浮宫看月生却笑羣仙餘習在隨身宫殿逐人行絶唱軒問誰投筆早來過春日華陽春睡多懷裏錦空鯨已卷松根苓長葉成窩詩無獺髓痕猶在夢有鸞膠斷若何洛下書生無苦思我今餌藥卧山阿飛雨亭飛泉五色暎花梢秋色觀前看玉豪花落空中和月冷樹當溼處見雲消依依雨氣侵螢火一一水紋生鶴毛㡬度下簾山影動卧看紅日到芭蕉散菴漱流枕石傍寒林散髪酣歌稱散人胡蝶枝頭無昨夢初蟬葉下見前身衣沾寳掌泉中雨内有盤陀石上紋不見屋頭樗櫟樹無材入用老猶存麞谷㡬回木落聴秋聲又被春風染樹青踈竹䕃中山影重冷雲葉上雨花生寒沙引水來遊鹿别樹開椿種茯苓石甗峰南甑峯小許渾詩裏舊知名麞谷澗清流拂石下岩隈澗底菖蒲曳緑苔野鹿避人懸樹宿溪魚乘水上山來翠連春草誰能拾風觸石崖彊半迴自入夏來凉意足更移脩竹澗邊栽伏蟾山山上飛雲去不留山中蟾兔又經秋斗臨河曲侵鶉尾露上莎根到草頭緑桂花中歌白苧碧梧影裏飯青牛有時竹上蟾蜍下滿腹丹書濕欲流寳掌泉屋上無端雨亂飄雨留石罅碧寥寥浮光出穴藏丹淺浣水為花到地消石髪年深長滿洞玉魚春冷未生苖泉中自是蛟龍窟頃刻隂雲滿樹腰尋春園覔春無路得寒林萬里清和此晏温載酒尋芳常恨早無金入户只藏春栁濃不似生時色花斂仍依摺處痕獨有悠然觀前月石林寒絶也隨人月樓花落水侵岑紫石峰前緑又新承露囊中盛臈藥無塵䄂裏有晴雲松髙猿見古時月花晚鶯添㡬日春籬畔尋芳尋不見楞梨緑李下紛紛雨望臺烏傷墓道有無間興濟橋東衆緑繁林外日斜虹有影堦前雲去石留根葉隨風轉時過樹雨傍山來不入村更著蓑衣看瀑布天葩日暮正飜飜山館石甗峯前緑草肥菟絲挾雨上梧枝天台道士投龍去少白山人相鶴歸苜蓿帶茸初暎日雕胡落釡半成糜石楠花落無人掃誰卧水隂歌采嶶山莊澗中薏苡緑如藍枸杞黄精滿屋山掃葉僧將猨共爨賣花人與蝶俱還雲生石筍埋雙樹雨引銀涎過八塼林下四時春不去澆花采藥送飛年琴臺臺下湧泉如鼔鐘亭無燕語有風松石根漸見蘭成畝影裏不知花㡬重月夜聴泉翻羽調水聲和譜寄山翁自從獨往窮山後不見繁聲入亂中飛花亭又見前緗桃穠李墮餘芳水麝衝雲度石梁芳樹斂花貪結子嬌花無骨不禁霜鳥銜墮蕋春無色日轉遊絲風有光杜曲詩人愁欲絶山人不解惜年芳遊子拈花怨落暉山人猶恨落花遲絮抛簾下鶯無力果在蕋中人不知紅日正酣那是雨青皇臨别更留衣年來杜宇惜人事却向陽春去後啼梅殘直至落花飛紅暎飛花緑暎葵風信入林添净食春光一線上游絲絮輕便欲排雲去花好多應換骨來二十四番却掃盡氷花剪下作寒梅風香亭池頭爽氣日徘徊竹院何曽有麝媒月礙桂枝飄子落鼎湖蓮葉轉空來風隨太乙凌波起花為胎仙傍水開香積界中天地濶景差何用上蘭臺春日閨思白玉堂前䨥燕飛堂中思婦怨殘暉臂環寄逺青蕪合瓊字題乾白雁歸醉倚合昏驚葉暗愁尋荳蔻妬花肥牕間昨日同心錦染罷香絲不上機席家洞洞在席家谷口前後相通天梯石棧落霞邊月地雲階且醉眠束緼才通山北户崩崖盡展洞中天雨餘秋菌化為碧石上霜楓不解丹聞道仙人曽控鶴羽衣環珮玉珊珊山有白楓石筍金莖半折尚亭亭銅柱稀㣲見刻銘花日漸移連影動石根不死有香生山前留眼通靈海天上無人記摘星何處人間覔此竹昔年曽出夜郎城霹靂石雲根斷裂翠崚嶒匕筯都忘世已驚玉女今為擣衣石晉人猶覔少㣲星松髙琥珀無苗出蟾老丹書滿腹生却憶天台狂道士石中衣祴竟通靈跳銀溪枕石聴泉伏草萊跳銀溪上日裵􅏆山間逺樹迎人出日轉晴虹渡水來雲氣長連西澗石春寒猶在北枝梅谷中㡬載秋無黍沙上菰蒲暖更栽書房休名不立死如麻挾册空山望碧霞書在終難招李杜灰寒無處覔隂何一作門外雨生雲没鶴松根苓長葉成窩春歸一尺人間淚雲暖萬重烟際花一作天雞颺下唐時綬越鳥銜來楚地花風景尚堪留研席浮生憂樂向來多圜築圜却欲留方士一室圜中度嵗年有客持雲坐盤石無人伴月出蘿烟晴晞白髪三千丈寒折朱絲五十絃𤣥圃方壺君莫問人間回首即神仙春日題水軒黄金縷水細粼粼葑合平池緑似雲鸚鵡無言初病瘴丁香不結又經春行稀蠟屐留前齒坐久玉琴生斷紋㡬度凭欄愁舉袂春花半作庾公塵樓氏雲樓試上雲梯興不窮虛牕瀟洒絶塵踪雲含雨氣三千里樓揷天心第九重碧瓦朱甍嘗宿鳳白衣蒼狗不從龍眼前景物清如許詩思還開錦綉胸分題送李齊賢三首綉衣亭彩鸞銜誥傍花飛知有恩榮出帝闈八角靈文金作冊三天使者繡為衣華陽洞古亭猶在句曲山深鶴未歸寄語仙人張伯羽何時邂逅説𤣥㣲占星臺椎碎臺前六合儀登臺猶自説璿璣靈槎有客侵河鼓别墅何人覔少㣲銀漢經天還北拱玉蟾入月却西飛太平共喜興文教金璧煌煌夜吐輝半湯湖湖上殘烟弄薄晴湖堤楊栁午風輕白波咫尺分寒熱赤鯉東西異死生天向月中藏日髓人疑陽裏有隂精廣文暇日頻相過㡬度沉思翫物情分題送李仲常江隂知事三首暨陽湖白浪浮天雪作堆羞將俗客洗塵埃月從水底沈鈎去船似鷗邊泛葉來野屋有籬編白荻漁磯無席藉蒼苔功曹吟苦多詩渴擬借平湖作酒杯釣臺憶昔𤣥璜上釣鈎鷹揚曾起佐姬周臺虚人在空中立雲静天從水面浮石裂猶疑千古雪風吹不斷一絲秋政成蓮幙多清暇他日停驂此地遊翠光亭亭前練水細如縈亭上君山玉作屏林斷纔通呉月白雁飛不盡楚天青莓苔着雨長黏石翡翠迎風欲墮翎恠得步兵迷望眼詩成正值酒初醒詩林亭少日論文氣似霓看花覔句到花飛吟成思入月中去語冷心從雨外歸林下樹寒和石瘦雲邊螢溼度花遲眼中有句無人道投老抛書衣鹿皮玉雪亭九首蓬萊山頂玉為峰夜夜晴光吐白虹石髓多年化韶粉氷華無意屬東風一天素月連雲冷萬斛明璣墮地空只恐髙寒禁不得乘鸞飛度碧瑶宫梨雲栁絮共㣲茫春入園林一色芳枸杞通靈空吠月芙蕖到死不禁霜夢遊蓬島瑶臺曙歌落呉雲玉樹長亦擬廣寒親學舞朝來新製白霓裳冰夷遊遍列仙家片片臨風散六花隂壑有光迷白月亂山無處覔青霞臺髙漸見石稜長枝重不禁梅影斜聞説銀河都剪碎津頭㡬欲問星槎六丁鑿碎玉崚嶒刻玉為花笑裂繒石蜜和漿調露蕋茶鐺無水斵崖氷城頭看樹低三尺雲裏有山知㡬層欲寄江南問春信珠璣落紙筆光凝凍雲岩壑曉曈曨目極齊州望欲空落月回光窺上界嬌花無信誤東風曲吹鐵笛驚雲散槎向銀河與海通野客燒丹深洞裏自調火候似春融花遶亭臺水遶門壺中别是一乾坤銀蟾飛去秋無色白石長來雲有根樹印蚪枝翻畫譜僧調獺髓補詩痕相如健筆誰堪繼好騁詞華賦兔園銀漢傾翻貫月查驚鴻無處認江沙水晶簾密秋光冷華蓋峰髙天影斜飛瀑半凝蒼玉佩薰風不度碧桃花山前山後多隣曲盡作江南富貴家俗塵無路到岩扃瓊作池臺玉作亭海月寒通千頃白楚山瘦减八分青回屏紋細裁龜甲野褐年深補鶴翎應有才華奪天巧天葩飛墮滿中庭羽仙飛步駕青鸞仙袂臨風響佩環琪樹移根來月裏瓊花無夢落人間春回隴首梅先覺舟入山隂客未還我亦玉堂揮翰手他年鵷鷺簉朝班送蔡竹澗江山教諭仙霞嶺與落霞齊乘興吟遊日未西簾影到池元是水縠紋浮雨却成溪烟青院竹鸞窺客日暖宫芹燕拾泥莫道廣文官况冷牕前生意草萋萋送余善之歸瀏陽瀏水沈沈上有山駱駝洲渚鬭漩澴浦楓不向霜中赤湘竹猶餘淚下斑書屋昔年驚逺别錦衣晴晝喜初還哦松未盡平生志莫戀亭皋放白鷴次王吉夫暮秋旅懷韻風吹白日下遥天容易人間換嵗年菊老不隨霜共落雲飛却與雁争先探囊野草皆為藥入市山梨便直錢逺道故人成久别每因景物思綿綿其二客路風霜厭逺行芰荷猶映舊袍青東山雲杳家千里南國秋深雁一聲玉筍班頭紅日近金華洞口白雲扃求仙何似求名切㡬誤還丹煉未成送盧經歴歸北汝南不識有宗資幕府惟聞贊畫奇化筆㡬驚霜共肅歸舟祇許月相隨松花風老金華洞桐樹煙青婺女祠曽是舊時遊適地郡人終古結遺思金華通天洞石扉髙暎碧芙蕖二室聯翩逼翠虚字裏蒼苔猶自活茶邊寒木易成枯呉中太白争華一作榮地林下青羱化石餘三洞周回五百里金堂石室盡仙都永日觀㡬番落葉樹隂殘説與山人更不看春日花連小東白暮年草創大還丹月車長遶呉天角石影生從太極前只把蟠桃分嵗月一花一實一流年拙齋無心奔競已才疎投筆抛書學佃漁石鼎有時然緑楚水扉㡬度種丹魚夏禽反舌餘聲盡薜荔連墻片影無我亦年來聲跡斷莫題書札問潛夫心逺菴著屐登山援葛藟聴猨待月夜眠遲書成䄂裏燕銜去月死枝頭猿不知寄逺豈無萱草帶勒銘自寫茯苓芝何須更覔桃源路朝市山林處處冝石廬風磴盤空冷逼人林居穴處古遺民砂飛滿地猶如燕草緑知天不愛春河漢帶星臨石上廣寒無月庇花身只愁急雨隨風度結屋半間留白雲正月晦治雪觀緑楚丹荑處處迷東風吹下萬玕琪月無寸影夜如曙地有六花春不知玉樹曽聞後庭曲天葩别有寄生枝瓊樓銀闕知何限約客瑶池未可期三泉泉眼離離傍石稜奔流脈脈到軒楹詩成石面花無數夢冷池頭草不生江夏茶經有遺譜南磳水落變新聲林居漸覺機心斷渇鹿逄人自不驚瀑布恠雨蠻烟入座寒居然煙雨隔晴天化為淮海氷三丈剪下松江水半邊蜀客槎星向天上翰林詩句落風前自從擊碎潭心月直至於今不肯圓石礙樓冷雲堆裏散人家叠嶂回峰徃徃遮觸石纔通西澗水借春只有北枝花月臨古徑松隂鬭風引前朝樹勢斜誰信壺中天地濶庭除帷幕浩無涯少㣲巗石醜松寒槲葉槲葉一作夏籜乾振衣又在碧霞邊南州處士星猶在今嵗中秋月未圓十五日題十六日望雲葉長黏岩上石雨苔不滿洞中天麝香眠處休驚起緑桂初紅果欲然西巗紫霞洞洞壑霞雲䕶隱居西巗洞下是華胥殘紅墮地五銖重漲緑過樓一丈餘瑶草碧花牛氏石錦囊玉軸米家書東州嵗賦三千粟我亦依岩學佃漁山堂石甑寒來雪易凝北峰良夜月盈盈人離雪外只方丈月比城頭低一程息石有稜依砌活茯苓無種入庭生白雲寒處人蹤絶不是山光説性情贈蕭浣平冦人物江南第一流將才儒術兩無儔英雄門列三千士功業家傳萬户侯金虎佩章光奪月玉龍出匣氣横秋奸回向化烟塵息坐擁笙歌醉玉樓次韻黄晉卿見寄之什㡬載林丘草木黄故人霄漢獨難忘宫衣雨露猶沾濕文律江湖共短長筆蹟舊時傾禇薛才名此日數鼂張他年明月中山寺重與詩人話夜凉又殿前對策士如墻我對山人説坐忘嵗晚單衣祇自短愁來白髪有時長山中蠟屐晴猶著石上朱絃雨更張有客江邊期不到只今秋日轉凄凉鹿皮子集卷四
