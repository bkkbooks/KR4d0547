body:
  text: 鹿皮子集卷三元陳樵撰七言近體題建炎遺詔解下塗金膝上衣一作蛾眉金縷衣匆匆命將墨淋漓圖中吳楚無端拆月裏山河一半虧銀漢經天都是淚杜䳌入洛不如歸黃衣傳詔三軍泣不是班師詔嶽飛吕氏樵隱圖山藹氤氲濕緑蓑無人空谷伴狂歌千年甲子棊邊老兩字功名世外多乳鹿穿雲覓芝草驚猿抱子度烟蘿心閒便是神仙侣莫對癡兒說爛柯蛺蝶圖禁籞名園信所之深紅膩紫共春暉人疑落葉有生色我道飛花上故枝掌上艷姬垂䄂舞屋頭故吏竊香歸花中只許秦宫活未必莊生入夢思北山别業三十八詠石岩即是樓觀太霞洞冬春居此洞石林深處飰胡麻幾度登臨送日車一作山中穴處送春和洞下栽桃攬物華雪到峯頭猶是雨雲生石上半成霞相看露下朝華草不放春歸冷艷花地冷花遲一作樹臨金壑元無影日傍晴崖不度花魏紫姚黃風捲盡人間蜂蝶到山家一作暮夜相過玩清月山前鄰笛兩三家飛雨洞盛夏居此流沫成雨中有小泓蜀天萬里入東州一作天梯石棧落東州冷翠侵扉翠欲流朱鯉有靈時上穴白狐生火幾經秋山中十暑寒猶在潭上千年雨未收昨日西林晞白髮濕雲依舊滿貂裘碧落洞秋初入居此洞灝氣翻衣露滿懷人言天上我驚猜近從月裏種花去遙見鼎湖飛葉來使我加餐有黃獨為人題榜是青苔杖頭化作光明燭願逐東皇下九垓又一首云聽盡東林夏雨聲自携桐几下岩扃白雲持得人誰寄明月攀來桂未生雨後引苔書洞榜霞邊摘葉寫山銘如何地絶重黎後猶自挑雲望玉京蘿衣洞蘿衣草帶護烟蓑一作手携緑玉下山阿楚國狂夫尚楚歌石影到溪千丈徑藤痕入木八分多泉分少白山中雨衣取雲門寺頂荷一作卷中真跡臨紅葉身上生衣捲碧蘿又作僧披槲葉收芝菌客厭蘿衣種芰荷洞口樵人誰語汝棊邊相遇懶相過五雲洞飛梁一作漁磯壓水石苔蒼洞口飛泉㵼一作下石梁屋上春霞常易散雪中樹影不曽長隂雲滿地晴飛白雨蝶依林暗貼黃一作松花入酒傳香碧貝葉分題寫硬黃又作飯收菰蔣叢邊米藥聚梧桐葉上霜手裏夫容渾忘却蓑衣日日釣滄浪巴雨洞濕雲侵袂一作依洞細􅚉􅚉自曬蓑衣石上楓海月長來飛雨下仙家半入漏天中石稜近水依崖長山柿著霜連葉紅却笑當年補天手煉成五色竟無功梅暾石篁竹瀟瀟暗水鳴一作隔水朝暾奕奕耿殘星繁花無處分南北明月何時厭死生石樹裹雲長自溼日華映雨半邊晴霜晨露夕長來往幾度攜琴鼓再行越觀在岩頂吳根越角兩茫茫石傘峰頭俯大荒鳥道北來通禹㑹雁程南不盡衡陽雲移暫覺天河沒月暗不知松影長天姥若耶他日事明朝采蕺下山梁陳氏山林春日雜興賸水殘山瘴海濵一丘一壑可全真月華一作夜光雖死猶隨我春色為塵亦汚人石護生香成石乳花連别樹作花身他年終擬忘名氏碣石桐江理釣綸新接桃梅傾一作人間奪非我願忠恕吾知可感神溪亭百尺層崖接翠微潭空石影曉離離雲隨白鶴翔千仭月與青猿共一枝不信水深騎赤鯉曽因夢裏殺黃鸝一作牀下苔花大如席亭前巴字細成溪芳洲翠羽無人拾自補山中白接䍦醒酒石在少微岩下有窪樽夢渴醒來賦楚騷一作首屢搔紛紅駭緑未全銷樽空鸚鵡杯猶在歌罷玕琪樹尚搖夜久月方臨石上雲低雨不到山椒平泉池館吾無分栗里徴君或可招翻經臺石函朱機曙雲中雲散臺髙萬象空枝重有時來白鳥雨殘無處著晴虹血書貝葉三年碧秋入蘿衣半袂紅幾度山人同聽法翠微深處石池龍東白草堂屋後茳蘺與水平屋頭很石列為屏捲簾帳下雲先去步月庭前樹欲行一作齊餘瓢裏水猶活晦近花前月尚生白雨侵階渾是緑一作桃洞落英晴更碧黃一作山童食柏久成青如何庭下朝陽影盡在少微巖上明望月臺在岩下玉簫吹斷暮雲平散髮臨風露一作夜氣清尾見欲當南紀出月銷半入楚天青松髙琥珀無苖茁蟾老丹書滿腹生一作靈星隔漢烏橋度細草成茵碧火生桂子何年生一作來石上丹英零落樹冥冥銀谷澗空碧亭水光山緑滿䦨干上有琉璃萬頃田水鳥臨池青入羽仙人唾地碧如天雨添銀谷空中翠雲是蒨桃花上煙只有垂猿一作緑衣無倒景有時弄月到亭前地多海棠緑一作有時却掛窗前少霞洞山居太霞洞口一作裏採金芝千嵗山南一作前聽碧雞煮石鼎中饒一作燒緑薤封書函外有丹泥度關僧寄娑羅樹入市人傳木客詩又一作却抱瑶琴向隂洞青禽啄碎碧梧枝圁谷澗一作臺雲在䦨干葉在庭瓢一作囊中無藥事一作自飛騰丹霄有路星辰近一作長河如帶東南拆又作銀河屬地西南溼明月無根日夜生滿䄂天香和夢冷半村雨色傍林青仙人約我瓊樓上一作瓊樓玉宇丹霄裏只恐月中秋更清少霞洞作室煙霧霏霏溼麝煤一作長緑臺文生緑硯硯生苔一作海棠滿徑不須栽天風拂地鳳笙下楚雨入吳龍女回石壁水花一作壁上水紋泉湧出海棠一作花前春色鳥銜來洞天只在風塵外門外遊塵拂不開圁谷澗水樂聲中共夕凉雪花片片灑衣裳山中古樹如魚大一作碩果如瓜大水上遊絲似線一作雨長栁絮散為萍梗紫花根染作牡丹黃一作采藥奴舂菰作米談經人指樹生薑自從西域神僧死一作僧祇去澗上一作南地無人識水香少霞洞柏葉山前緑石扉溼雲墮地不能飛青童卧護千年鹿木客相傳一派詩龍帶雨花臨硯滴一作海僧添槲葉上秋衣山人晏坐青霞外飲露餐霞度嵗時泰素壇竹死煙寒樹不榮石壇千仭與雲平春來天上元無色雨到人間方有聲夢入松風吹不斷詩如芳草剪還生陶山北望飛霞散夜半有時孤鶴鳴一作他年學製鄒生律盡種山樊與杜蘅招隱巗一作山何年積蓋與山齊樹轉峰回草徑微野火裂為方解石秋風不到寄生枝誰來樹下看雲坐半入人間作燕飛箬笠岩一作柏葉山前今净社不須更草北山移紫嶶岩在蘭池上手種岩花對北峰花間無葉紫茸茸人行鳬雁不到處家在鶯花第幾重緑水值隂還又碧青春著樹却成紅紫薇莫入絲綸閣且伴山中白髮翁北峰皂閣山前小水明甗峰無影樹亭亭人從煙雨上頭立詩到鶯花過後清雲傍樓臺低地碧天將草樹染春青名山何事窮幽僻臨水登山已稱情石甗峰柏葉山前鶯亂啼小樓西望石離離北峰雲出何曾斷一作甑中雲起長如溼東郡一作門外山凡不解飛蘿蔦相扶枝著樹蟾蜍不死肉成芝黃粱夢短風塵暗不是山人好食薇飛花亭昨日朝華照夕曛又看夕秀比朝菌松髙猿見古時月花晚鶯添幾日春盛露囊中封臘藥無塵䄂裏裹吳雲人間何用春長在只愛飛紅日日新水亭少鳳穿花照水盟一作門外飛流拂石稜水禽衝浪動軒楹一作溼簾旌雲從薜荔衣中起雨向玕琪樹上生曲水傍人一作隂澗有泉流白羽嬌花無語答黃鶯澗中日與山中日一作地中日與天邊日同上晴􅖠各自行有流羽泉清凉臺水邊石影覆松亭洞口飛雲細細輕花重只因雲下溼草寒誤向影中生好風入夏傳芳信片雨隨雲度月明不用破瓜沉緑李自從雲後有餘清忘憂閣冝男葉上幾飛螢一作冷雲生夢畢醒來笑倚楹一作聽盡風聲聽水聲天外唾如雲樣碧一作杯裏酒連天共碧江南春與草俱青鐺一作銼寒已喜松丹熟燭盡只消華艷明無喜亦無愁可解山人投老竟忘形一作見說世間愁滿地誰知樂事在林坰南軒石上菖蒲緑滿叢石根水竹傍梧桐人來此地見山碧月未冷時如日紅春水有聲通北澗晚花無信誤東風人間不是髙寒地那得春紅入夏中雲山不礙樓飛花墮地栁依牆很石侵檐徑草香人道峽中無落月我疑肘後有垂楊庭虛只放溪雲度水淺不妨松影長却憶壺中天地濶十洲煙雨正茫茫野芳園桂子紛紛入我懷海棠芳桂雪生葩日移深澗松隂上風引前朝樹勢斜芳草無名多是藥雲藤著紫不須花牡丹未入曹劉室元白歐蘇不用誇蘭池空翠亭前露草繁自栽蘭芷雜芳蓀猿窺澗底風枝動鶯踏花間水影翻早就山林成獨往晚從桃李學無言國香只合依泉石種向人間恐礙門空翠堂蕉葉茙葵照檻明山光入室雨初晴平分天上無邊色送盡江南未了青息石長年依砌活茯苓無種入庭生亭西昨日林霏重採藥歸來露滿庭山齊一名草易臺幾一作秋夜山中作月荒晨朝挾册傍初一作山陽懸崖種菊紅千葉開户見山青一方一作登臺望月丘陵逺開户草𤣥枝蔓長石上韋編原是竹林中白露半成霜春皇未畫非無易石室遺一作成書不用藏山園洛陽池館半桑田斷竹操觚日灌園春日花連小東白暮年草創大還丹蕨薇自古猶長採桃李于今竟不言一徑桑榆隨地暖雨餘苜蓿又䦨干一本作斷竹操瓢日灌園洛陽池館半桑田蕨薇自古猶長採桃李于今竟不言隔水三竿花上日去人尺五澗中天山居亦欲知春事刻畫隨宜不用妍壺天在澗上一作壺天閣宫殿隨身信所如寓形一室似樓居神遊八極皆吾土天入三山三神山不滿壺雨夜無人共清月水扉幾度種丹魚山童長怕漁舟至不放桃花下五湖一作剎海中間别一區普香香積是通衢花連藥蔓疑無路天入靈山不滿壺芥裏須弥空處有階前花影月中無自從漁父穿花去不放桃花下石渠鹿皮子墓土蝕苔一作石上藤侵古瓦棺一作斑化臺深鎖萬松關坐看天上樓成日吟到人間詩盡年句漏無靈丹竈冷孟郊未死白雲閒江南春草年年緑又向他生說鄭𤣥遊絲兜率宫中拂不開支機石上亂成堆超凌塵坱髙千仭束縳虛空斷幾回又逐飛雲縈草樹暫隨片雨掛樓臺詩成猶憶宣和腳透過澄心紙背來臨花亭主人病癖愛年芳春日花荒夜月荒調水分符到西澗惜花封淚寄東皇天生國艷春無價日繞遊絲風有光物色是空非是色枉教蜂蝶一生忙惡雨愁風易結隂夜遊秉燭晝傳飱香添荔子能消日粥費桃花怕減春緑暗有人來折栁紅飛剪紙為招魂竹間午夢時驚覺滿眼卿雲覆錦茵芳草生煙藥在房鞓紅衣紫共芬芳丘園風雨三家市草木文章萬丈光花正欲言還寂默春無自性不堅良晚來只有鵝紅在莫放香絲取次黃滿樹琉璃問碧瑤當歸葉長映芭蕉樹頭生雨時時溼春色如花日日銷杜宇有言終不踐緑魚新種已生苗今朝百舌聞鶯語飛上梧桐特地嬌右挾長鑱左帶經蔬畦藥圃照衣明客來青鳳穿花去草盡蒼苔上樹生靈藥易荒常檢校繁花無賴枉丁寧來禽青李成隂後更覓楞梨日給勝花在人間春自歸去來何用杜鵑知鶴銜瓊蕊來仙苑雨引山薑過别枝天出異香薰寶樹日將五色染遊絲主人莫賦傷春句但使百花無盡時雨後金沙入栁隂紫薇紅藥正紛紜客來只道天開畫春去盡將花屬人越鳥啄殘松下子吳僧寄到水中雲蓮紅直到梅花發何處人間不是春松邊栁下日徘徊鳥散花紅墮酒杯芍藥成叢當户出茯苓分種傍松栽雲髙卷雨從風去花晚將春入夏來亭下肉紅如斗大耐看不似玉玫瑰逺山過雨緑崔嵬竹外青松竹下梅滿樹丹青隨物換平生富貴逐春來歌珠一串鶯流出花影數重風揭開關右牛酥賤如土莫教紅紫落成堆逺目樓天垂平野樹團團雨過平蕪緑更鮮何事髙梧遽如薺只消寸草已凌煙山遮春欲歸時路雁入鳬飛不盡天廬舍似蝸人似豆天開粉本夕陽邊蠟屐亭晉阮孚避亂婺州七賢老死獨南奔䄂有江亭墮淚痕函夏盡為新土宇醉鄉不失舊乾坤金貂曾入丹陽市蠟屐應歸白下門惆悵黃門墓前柏不禁三度見風塵西峴峰寺傍皆官山聽盡熙寧水樂聲斷碑無字倚荒庭雲歸僧舍樹皆溼犬吠獵圍山誤譍覆屋松隂遮日黑隔林春色為官青故侯轍迹無尋處丞相題詩擬峴亭雨後看山對酒歌飛紅駭緑滿岩阿一作紅銷緑漲草成窩萬重山外碧方寸五色雨中青最多亭下日生霞映草松根苓長葉成窩一作峯漸欲危通月過路遮不斷奈春何江源分付西流去莫作門前東逝波涵碧亭劉禹錫題涵碧亭猶能三伏凛生秋涵碧池頭夏氣清我從三昧起經行移樽近樹傳杯緑向日看山入户青人似亭前花不語詩如江上草無名山中水調知何限不入熙寧水樂聲入谷沿流曳杖行亭亡白谷半為陵蟬驚兩腋風初定樹少多年秋不生水急溜穿南澗石雲深黍沒夕陽僧龜兹板上元和腳猶有劉郎舊姓名丙戌池曲奔流下石渠池頭空翠溼烟蕪一作池曲新泉不滿壺池頭縣溜溼烟蕪夏禽反舌餘聲盡薜荔連墻寸影無一作莓苔石上千挂落桃李花間一字無僧爨屋頭猿挂樹鳥銜窗外雨生魚長安才子看圖畫疑是仇池隱士居丁亥上虞魏氏湖上精舍圖湖上蘭舟水上亭有時水漲與階平亭前古栁經春弱門外孤洲昨夜生海氣遙連一作侵育王塔蜃樓半入㑹稽城山隂道士攜琴至寫盡風聲到水聲春停舟日日望東溟蓼岸蘆洲露未凝沙户得花聯作絮吳姬雪藕織為繒馮夷送月臨軒落海若令一作分潮入岸生朝暮屯蒙丹自熟披沙莫學趙臺卿秋霜巗石室懸流脈脈又涓涓浣水為花到席前我為天穿來煉石僧從雨下度流年月中溜灑黃金淚壁上雲生火玉烟山下四鄰皆雨外天瓢枯槁蟄龍眠洞天無暑亦無寒淑氣芳風不出山掃葉僧歸雲未溼賣花人去蝶先還滿庭修竹下黃葉千嵗古松生緑烟盡道雪中依祼壤我疑夏室是氷天樓閣天然石削成山為棟宇石為楹丹砂伏火有光景石斛依空無死生葉落世間多月色瓢亡林下缺秋聲山中水石皆吾黨竹兔松雞不用驚滿林翠霧溼麻衣山影遙侵白板扉竹石無心吾所畏煙霞有疾不須醫夢騎鶴處天逾濶歌遏雲時花不飛燕子飛來背人去吾廬無地可棲遲巖穴冬溫夏氣清有時采蕺度崚嶒閒雲起作飛雲去今雨還隨舊雨生樹上菟絲低窣地階前息壤暗通靈人間甲子何須問只憶山花幾度榮丹荑滿地藥生茸著屐登山春正濃委羽山人來相鶴天台道士去投龍風傳花信歸何處日卷松隂展向東不見霜岩松下竹空王未作已心空石樓草廬一室寬於一畝宫隔林竹樹影重重青春著地十分緑白日經天兩度紅小草自憐無逺志茯苓終不近孤松未須西憶金華洞只在周回百里中楚氛千里海連淮思子臺前望母臺春在地中長不死月行天盡又飛來林亭清論松為麈荷屋寄生花作胎七十九年殘喘息欲從李白上天台哀江南效李義山幾年王謝望升平戎馬臨淮日繞營萬里邊塵暗京洛五朝王氣在金陵臨春閣上華林近玉樹歌中璧月生獨有紹興經亂後聖賢相遇頌中興慧力寺斷崖僧緣鳥道上穹蒼下視斷崖千丈强百里周回𤣥鶴洞羣仙出沒白雲鄉山藏宿雨禾生稼日轉垂楊影過墻未若鼎湖天地絶無人折得碧蓮房鹿皮子集卷三
